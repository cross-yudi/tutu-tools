<div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / AES 加密解密</div><h2>🔐 AES 加密解密</h2><p class="desc">在线 AES 对称加密与解密，支持 CBC 模式</p><p class="desc-en">AES encryption & decryption — secure symmetric encryption</p></div>
<div class="tool-body">
<div class="tool-row"><div class="tool-panel"><label>密码 <span class="label-en">Password Key</span></label>
<input type="text" id="password" placeholder="输入加密密码... Enter password...">
<label style="margin-top:10px;">文本 <span class="label-en">Text</span></label>
<textarea id="input" placeholder="输入要加密或已加密的文本... Enter text..." style="min-height:140px;"></textarea>
<div class="btn-row" style="margin-top:8px;">
<button class="btn btn-primary" onclick="encrypt()">🔒 加密 Encrypt</button>
<button class="btn btn-primary" onclick="decrypt()">🔓 解密 Decrypt</button>
<button class="btn btn-outline" onclick="clearInput('input')">清空 Clear</button></div></div></div>

<script src="../../js/common.js"></script>
<script>
async function getKey(password) {
  var enc = new TextEncoder();
  var keyData = enc.encode(password);
  var hash = await crypto.subtle.digest('SHA-256', keyData);
  return crypto.subtle.importKey('raw', hash, {name:'AES-CBC'}, false, ['encrypt','decrypt']);
}

async function encrypt() {
  var text = document.getElementById('input').value;
  var pwd = document.getElementById('password').value;
  if(!text||!pwd){showToast('请输入文本和密码 Enter text and password');return;}
  try {
    var key = await getKey(pwd);
    var iv = crypto.getRandomValues(new Uint8Array(16));
    var enc = new TextEncoder();
    var buf = await crypto.subtle.encrypt({name:'AES-CBC',iv:iv}, key, enc.encode(text));
    var result = btoa(String.fromCharCode(...new Uint8Array(iv)) + String.fromCharCode(...new Uint8Array(buf)));
    document.getElementById('output').textContent = result;
    document.getElementById('infoTip').textContent = '已加密 Encrypted | ' + result.length + ' 字符 chars';
  } catch(e) { document.getElementById('output').textContent = '加密失败: '+e.message; }
}

async function decrypt() {
  var text = document.getElementById('input').value.trim();
  var pwd = document.getElementById('password').value;
  if(!text||!pwd){showToast('请输入文本和密码 Enter text and password');return;}
  try {
    var key = await getKey(pwd);
    var raw = atob(text);
    var rawBytes = new Uint8Array(raw.split('').map(function(c){return c.charCodeAt(0);}));
    var iv = rawBytes.slice(0,16);
    var data = rawBytes.slice(16);
    var buf = await crypto.subtle.decrypt({name:'AES-CBC',iv:iv}, key, data);
    var result = new TextDecoder().decode(buf);
    document.getElementById('output').textContent = result;
    document.getElementById('infoTip').textContent = '已解密 Decrypted';
  } catch(e) { document.getElementById('output').textContent = '解密失败: 密码错误或格式无效 Decryption failed'; }
}
</script>
