document.getElementById('birth').valueAsDate=new Date(1990,0,1);
function calc(){
  var birth=document.getElementById('birth').valueAsDate;
  if(!birth||birth>new Date()){showToast('请选择有效的出生日期');return;}
  var now=new Date();
  var months=(now.getFullYear()-birth.getFullYear())*12+(now.getMonth()-birth.getMonth());
