<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编码解码 Base64 Encoder - 兔兔工具站</title>
  <meta name="description" content="在线 Base64 编码解码工具，支持中文等 Unicode 字符。Online Base64 encoder & decoder with full Unicode (Chinese, emoji, etc.) support.">
  <meta name="keywords" content="Base64编码,Base64解码,Base64 encoder,Base64 decoder,在线Base64,Base64 encode">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="../../index.html" class="logo">
      <span class="logo-emoji">🐰</span>
      <span class="logo-text">
        <span class="logo-cn">兔兔工具站</span>
        <span class="logo-en">Tutu Tools</span>
      </span>
    </a>
  </div>
</header>

<main class="main">
  <div class="tool-header">
    <div class="breadcrumb"><a href="../../index.html">首页 Home</a> / Base64 编码解码</div>
    <h2>🔄 Base64 编码解码</h2>
    <p class="desc">在线进行 Base64 编码和解码转换，完美支持中文</p>
    <p class="desc-en">Online Base64 encode & decode with full Unicode support</p>
  </div>

  <div class="tool-body">
    <div class="tool-panel">
      <label>输入内容 <span class="label-en">Input</span></label>
      <textarea id="input" placeholder="输入要编码或解码的文本... Type text to encode or decode..."></textarea>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-primary" onclick="encode()">🔒 编码 Encode</button>
        <button class="btn btn-primary" onclick="decode()">🔓 解码 Decode</button>
        <button class="btn btn-outline" onclick="clearInput('input')">清空 Clear</button>
      </div>
    </div>

    <div class="tool-panel">
      <label>转换结果 <span class="label-en">Result</span></label>
      <div class="result-area" id="output"></div>
      <div class="info-bar">
        <span></span>
        <button class="btn btn-outline btn-sm copy-btn" onclick="copyText(document.getElementById('output').textContent)">📋 复制 Copy</button>
      </div>
    </div>
  </div>
</main>

<footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer>

<script src="../../js/common.js"></script>
<script>
function utf8ToBase64(str) {
  var bytes = new TextEncoder().encode(str);
  var bin = '';
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function base64ToUtf8(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function encode() {
  try {
    document.getElementById('output').textContent = utf8ToBase64(document.getElementById('input').value);
  } catch (e) {
    document.getElementById('output').textContent = '编码出错 Encode error: ' + e.message;
  }
}

function decode() {
  try {
    document.getElementById('output').textContent = base64ToUtf8(document.getElementById('input').value.trim());
  } catch (e) {
    document.getElementById('output').textContent = '解码出错 Decode error: invalid Base64 string';
  }
}
</script>
</body>
</html>
