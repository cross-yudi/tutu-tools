<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>打砖块 Breakout - 兔兔工具站</title><meta name="description" content="经典打砖块游戏，鼠标/触控移动挡板。Classic Breakout — move paddle to bounce ball."><meta name="keywords" content="打砖块,breakout,经典游戏,小游戏"><link rel="stylesheet" href="../../css/style.css"><style>canvas{border:2px solid var(--border);border-radius:8px;display:block;margin:0 auto;background:#1a1a2e;}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 打砖块</div><h2>🧱 打砖块</h2><p class="desc">移动鼠标或手指控制挡板，消灭所有砖块！</p><p class="desc-en">Breakout — move paddle to destroy all bricks!</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;"><label>分数 <span class="label-en">Score</span></label><div style="font-size:2rem;font-weight:800;color:var(--primary-dark);" id="score">0</div><canvas id="c" width="400" height="500"></canvas><p style="font-size:.75rem;color:var(--text-en);margin-top:8px;">鼠标/触控移动挡板 Move paddle with mouse/touch</p><button class="btn btn-primary" style="margin-top:8px;" onclick="init()">🔄 重新开始 Restart</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var c=document.getElementById('c'),ctx=c.getContext('2d'),W=400,H=500;
var paddle={w:80,h:14,x:160},ball={x:200,y:380,r:6,dx:3,dy:-3},bricks=[],score=0,gameOver=false,animId;
var colors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316'];
function init(){paddle.x=160;ball.x=200;ball.y=380;ball.dx=3;ball.dy=-3;score=0;gameOver=false;bricks=[];for(var r=0;r<8;r++)for(var c=0;c<10;c++)bricks.push({x:c*40+4,y:r*22+30,w:36,h:18,color:colors[r],alive:true});document.getElementById('score').textContent='0';if(animId)cancelAnimationFrame(animId);loop();}
function loop(){
  if(gameOver)return;
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  // bricks
  for(var i=0;i<bricks.length;i++){var b=bricks[i];if(b.alive){ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(b.x,b.y,b.w,4);}}
  // paddle
  ctx.fillStyle='#fff';ctx.fillRect(paddle.x,H-20,paddle.w,paddle.h);
  // ball
  ball.x+=ball.dx;ball.y+=ball.dy;
  if(ball.x-ball.r<=0){ball.x=ball.r;ball.dx*=-1;}
  if(ball.x+ball.r>=W){ball.x=W-ball.r;ball.dx*=-1;}
  if(ball.y-ball.r<=0){ball.y=ball.r;ball.dy*=-1;}
  // paddle hit
  if(ball.y+ball.r>=H-20&&ball.y+ball.r<=H-10&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){ball.dy=-Math.abs(ball.dy);ball.dx+=(ball.x-paddle.x-paddle.w/2)*0.2;}
  // game over
  if(ball.y>H){gameOver=true;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('Game Over',W/2,H/2-10);return;}
  // brick collision
  for(var i=0;i<bricks.length;i++){var b=bricks[i];if(b.alive&&ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){b.alive=false;ball.dy*=-1;score+=10;document.getElementById('score').textContent=score;break;}}
  // win check
  if(bricks.every(function(b){return !b.alive;})){gameOver=true;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('You Win!',W/2,H/2-10);return;}
  // draw ball
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  animId=requestAnimationFrame(loop);
}
c.addEventListener('mousemove',function(e){var rect=c.getBoundingClientRect();var scale=W/rect.width;paddle.x=(e.clientX-rect.left)*scale-paddle.w/2;if(paddle.x<0)paddle.x=0;if(paddle.x>W-paddle.w)paddle.x=W-paddle.w;});
c.addEventListener('touchmove',function(e){e.preventDefault();var rect=c.getBoundingClientRect();var scale=W/rect.width;paddle.x=(e.touches[0].clientX-rect.left)*scale-paddle.w/2;if(paddle.x<0)paddle.x=0;if(paddle.x>W-paddle.w)paddle.x=W-paddle.w;});
c.addEventListener('click',function(){if(gameOver)init();});
init();
</script></body></html>
