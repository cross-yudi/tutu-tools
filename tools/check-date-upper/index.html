<script>
var numMap = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖','拾'];

function yearToUpper(y) {
  var s = String(y), result = '';
  for (var i = 0; i < s.length; i++) result += numMap[parseInt(s[i])];
  return result;
}

function convert() {
  var d = document.getElementById('dateInput').valueAsDate || new Date();
  var y = d.getFullYear();
  var m = d.getMonth() + 1;
  var day = d.getDate();

  var monthStr = m === 10 ? '壹拾' : m > 10 ? '壹拾' + numMap[m-10] : numMap[m];
  var dayStr;
  if (day === 10) dayStr = '壹拾';
  else if (day === 20) dayStr = '贰拾';
  else if (day === 30) dayStr = '叁拾';
  else if (day > 20) dayStr = '贰拾' + numMap[day-20];
  else if (day > 10) dayStr = '壹拾' + numMap[day-10];
  else dayStr = numMap[day];

  var result = '贰零' + yearToUpper(y).slice(2) + '年' + monthStr + '月' + dayStr + '日';
  document.getElementById('output').textContent = result;
}
document.getElementById('dateInput').valueAsDate = new Date();
convert();
</script>
