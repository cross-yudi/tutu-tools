var heads=0,tails=0,hist=JSON.parse(localStorage.getItem('coin_hist')||'[]'),flipping=false;
heads=hist.filter(function(h){return h.side==='heads';}).length;
tails=hist.filter(function(h){return h.side==='tails';}).length;
renderStats();showHist();

function flip(){
  if(flipping)return;flipping=true;
  var coin=document.getElementById('coin');coin.classList.add('flipping');
  setTimeout(function(){coin.classList.remove('flipping');flipping=false;},800);
  var isHeads=Math.random()>.5;
  var side=isHeads?'heads':'tails',icon=isHeads?'正面 Heads':'反面 Tails';
  document.getElementById('resultText').textContent='🎲 '+icon;
  if(isHeads)heads++;else tails++;
  renderStats();
  hist.unshift({side:side,icon:icon,time:new Date().toLocaleString('zh-CN')});
  if(hist.length>100)hist.length=100;
  localStorage.setItem('coin_hist',JSON.stringify(hist));showHist();
}

function renderStats(){
  document.getElementById('hCount').textContent=heads;document.getElementById('tCount').textContent=tails;
  var total=heads+tails||1;document.getElementById('hBar').style.flex=heads/total;document.getElementById('tBar').style.flex=tails/total;
}

function showHist(){
  var h=document.getElementById('history');if(!h)return;
  if(!hist.length){h.innerHTML='<div style="color:var(--text-en);font-size:.82rem;">抛硬币后显示记录 History here</div>';return;}
  h.innerHTML='<div style="font-size:.78rem;color:var(--primary-dark);margin-bottom:4px;">共 '+hist.length+' 次 Total</div>'+hist.map(function(item,i){var c=item.side==='heads'?'#f59e0b':'#9ca3af';return '<div style="padding:3px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;">'+(i+1)+'. <span style="color:'+c+';font-weight:600;">'+item.icon+'</span> <span style="color:var(--text-en);font-size:.7rem;">'+item.time+'</span></div>';}).join('');
}

function clearAll(){heads=0;tails=0;hist=[];localStorage.setItem('coin_hist','[]');renderStats();showHist();}
