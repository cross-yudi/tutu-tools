<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颜色转换 Color Converter - 兔兔工具站</title>
  <meta name="description" content="在线颜色格式转换工具，支持 HEX、RGB、HSL 互相转换，带实时颜色预览。Online color converter — HEX, RGB & HSL with live preview.">
  <meta name="keywords" content="颜色转换,HEX转RGB,RGB转HEX,color converter,HSL转换,颜色选择器,color picker">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .color-preview {
      width: 100%;
      height: 80px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      transition: background-color .3s;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="../../index.html" class="logo">
      <span class="logo-emoji">🐰</span>
      <span class="logo-text">
        <span class="logo-cn">兔兔工具站</span>
        <span class="logo-en">Tutu Tools</span>
      </span>
    </a>
  </div>
</header>

<main class="main">
  <div class="tool-header">
    <div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 颜色转换 Color Converter</div>
    <h2>🎨 颜色转换</h2>
    <p class="desc">在线 HEX、RGB、HSL 颜色格式互相转换</p>
    <p class="desc-en">Convert between HEX, RGB & HSL color formats with live preview</p>
  </div>

  <div class="tool-body">
    <div class="tool-panel">
      <label>选择颜色 <span class="label-en">Pick a Color</span></label>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <input type="color" id="picker" value="#f59e0b" style="width:56px;height:44px;border:none;cursor:pointer;border-radius:8px;background:transparent;">
        <span style="font-size:.85rem;color:var(--text-secondary);">或输入 HEX：</span>
        <input type="text" id="hexInput" placeholder="#f59e0b" style="width:130px;" value="#f59e0b">
        <button class="btn btn-primary" onclick="applyHex()">转换 Convert</button>
      </div>
      <div class="color-preview" id="preview" style="background:#f59e0b;margin-top:12px;"></div>
    </div>

    <div class="tool-panel">
      <label>转换结果 <span class="label-en">Conversion Results</span></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <div style="font-size:.78rem;color:var(--text-en);margin-bottom:2px;">HEX</div>
          <div class="result-area" id="hexResult" style="font-size:1.1rem;">#f59e0b</div>
          <button class="btn btn-outline btn-sm copy-btn" style="margin-top:6px;" onclick="copyText(document.getElementById('hexResult').textContent)">复制 HEX</button>
        </div>
        <div>
          <div style="font-size:.78rem;color:var(--text-en);margin-bottom:2px;">RGB</div>
          <div class="result-area" id="rgbResult" style="font-size:1.1rem;">rgb(245, 158, 11)</div>
          <button class="btn btn-outline btn-sm copy-btn" style="margin-top:6px;" onclick="copyText(document.getElementById('rgbResult').textContent)">复制 RGB</button>
        </div>
        <div>
          <div style="font-size:.78rem;color:var(--text-en);margin-bottom:2px;">HSL</div>
          <div class="result-area" id="hslResult" style="font-size:1.1rem;">hsl(38, 92%, 50%)</div>
          <button class="btn btn-outline btn-sm copy-btn" style="margin-top:6px;" onclick="copyText(document.getElementById('hslResult').textContent)">复制 HSL</button>
        </div>
        <div>
          <div style="font-size:.78rem;color:var(--text-en);margin-bottom:2px;">CSS</div>
          <div class="result-area" id="cssResult" style="font-size:.85rem;font-family:monospace;">background: #f59e0b;</div>
          <button class="btn btn-outline btn-sm copy-btn" style="margin-top:6px;" onclick="copyText(document.getElementById('cssResult').textContent)">复制 CSS</button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer>

<script src="../../js/common.js"></script>
<script>
var picker = document.getElementById('picker');
var hexInput = document.getElementById('hexInput');

picker.addEventListener('input', function () {
  hexInput.value = picker.value;
  updateAll(picker.value);
});

hexInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') applyHex();
});

function applyHex() {
  var hex = hexInput.value.trim();
  if (!/^#?[0-9a-fA-F]{6}$/.test(hex)) {
    showToast('请输入有效的 HEX 颜色值 Valid HEX required, e.g. #f59e0b');
    return;
  }
  if (hex[0] !== '#') hex = '#' + hex;
  hexInput.value = hex;
  picker.value = hex;
  updateAll(hex);
}

function updateAll(hex) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);

  document.getElementById('preview').style.background = hex;
  document.getElementById('hexResult').textContent = hex;
  document.getElementById('rgbResult').textContent = 'rgb(' + r + ', ' + g + ', ' + b + ')';

  var hsl = rgbToHsl(r, g, b);
  document.getElementById('hslResult').textContent = 'hsl(' + hsl[0] + ', ' + hsl[1] + '%, ' + hsl[2] + '%)';
  document.getElementById('cssResult').textContent = 'background-color: ' + hex + ';';
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; } else {
    var d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

updateAll('#f59e0b');
</script>
</body>
</html>
