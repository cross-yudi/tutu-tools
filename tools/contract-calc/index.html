<div class="tool-panel">

<input type="number" id="total" value="100000" min="0">
<label style="margin-top:10px;">预付款比例 Advance (%)</label>
<input type="number" id="advance" value="30" min="0" max="100">
<label style="margin-top:10px;">质保金比例 Retention (%)</label>
<input type="number" id="retention" value="5" min="0" max="100">
<label style="margin-top:10px;">分期数 Installments</label>
<input type="number" id="installments" value="3" min="1" max="24">
<button class="btn btn-primary" style="margin-top:12px;" onclick="calc()">计算 Calculate</button>

<script src="../../js/common.js?v=4"></script>
<script>
function calc() {
  var total = parseFloat(document.getElementById('total').value) || 0;
  var adv = parseFloat(document.getElementById('advance').value) / 100;
  var ret = parseFloat(document.getElementById('retention').value) / 100;
  var n = parseInt(document.getElementById('installments').value);

  var advAmt = Math.round(total * adv);
  var retAmt = Math.round(total * ret);
  var remain = total - advAmt - retAmt;
  var perInstall = Math.round(remain / n);

  var html = '<div style="margin-bottom:8px;"><strong>合同总额 Contract Total：¥' + total.toLocaleString() + '</strong></div>';
  html += '<div style="margin-bottom:4px;">1. 预付款 Advance (' + (adv*100) + '%)：<strong>¥' + advAmt.toLocaleString() + '</strong></div>';
  for (var i = 1; i <= n; i++) {
    html += '<div style="margin-bottom:4px;">' + (i+1) + '. 进度款 Installment ' + i + '：<strong>¥' + perInstall.toLocaleString() + '</strong></div>';
  }
  html += '<div style="margin-top:8px;">' + (n+2) + '. 质保金 Retention (' + (ret*100) + '%)：<strong>¥' + retAmt.toLocaleString() + '</strong></div>';
  html += '<div style="margin-top:8px;color:var(--text-secondary);">合计 Total：<strong>¥' + (advAmt + perInstall*n + retAmt).toLocaleString() + '</strong></div>';
  document.getElementById('output').innerHTML = html;
}
</script>
