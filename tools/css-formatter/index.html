<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 格式化 CSS Formatter - 兔兔工具站</title>
  <meta name="description" content="在线CSS格式化工具，支持CSS压缩、美化。Online CSS formatter — beautify & minify your CSS code.">
  <meta name="keywords" content="CSS格式化,CSS美化,CSS压缩,css formatter,css beautifier,css minify">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a>
  </div>
</header>
<main class="main">
  <div class="tool-header">
    <div class="breadcrumb"><a href="../../index.html">首页 Home</a> / CSS 格式化</div>
    <h2>🎨 CSS 格式化</h2>
    <p class="desc">在线 CSS 格式化、压缩与美化</p>
    <p class="desc-en">Format, beautify & minify your CSS code</p>
  </div>
  <div class="tool-body">
    <div class="tool-panel">
      <label>输入 CSS <span class="label-en">Input CSS</span></label>
      <textarea id="input" placeholder="粘贴 CSS 代码... Paste CSS code here..." style="min-height:200px;"></textarea>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-primary" onclick="beautify()">🔧 美化 Beautify</button>
        <button class="btn btn-primary" onclick="minify()">📦 压缩 Minify</button>
        <button class="btn btn-outline" onclick="clearInput('input')">清空 Clear</button>
      </div>
    </div>
    <div class="tool-panel">
      <label>结果 <span class="label-en">Result</span></label>
      <div class="result-area" id="output"></div>
      <div class="info-bar">
        <span id="infoTip"></span>
        <button class="btn btn-outline btn-sm copy-btn" onclick="copyText(document.getElementById('output').textContent)">📋 复制 Copy</button>
      </div>
    </div>
  </div>
</main>
<footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer>
<script src="../../js/common.js"></script>
<script>
function beautify() {
  var css = document.getElementById('input').value;
  // 简单美化：在 { } ; 后换行并缩进
  css = css.replace(/\s*([{};])\s*/g, '$1\n');
  var lines = css.split('\n');
  var result = '';
  var indent = 0;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    if (line.indexOf('}') >= 0 || line.indexOf(')') >= 0 && line.length === 1) indent--;
    if (indent < 0) indent = 0;
    result += '  '.repeat(Math.max(0, indent)) + line + '\n';
    if (line.indexOf('{') >= 0) indent++;
  }
  document.getElementById('output').textContent = result.trim();
  document.getElementById('infoTip').textContent = '已美化 Beautified | ' + result.trim().length + ' 字符 chars';
}

function minify() {
  var css = document.getElementById('input').value;
  css = css.replace(/\/\*[\s\S]*?\*\//g, ''); // 去除注释
  css = css.replace(/\s+/g, ' ');
  css = css.replace(/\s*([{}:;,])\s*/g, '$1');
  css = css.replace(/;}/g, '}');
  document.getElementById('output').textContent = css.trim();
  document.getElementById('infoTip').textContent = '已压缩 Minified | ' + css.trim().length + ' 字符 chars';
}
</script>
</body>
</html>
