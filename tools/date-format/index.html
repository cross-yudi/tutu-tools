<button class="btn btn-primary" style="margin-top:8px;width:100%;" onclick="convert()">转换 Convert</button></div></div>

<script>
var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
var monthsShort=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var weekdays=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var weekdaysShort=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

document.getElementById('d').valueAsDate=new Date();
function convert(){
  var d=document.getElementById('d').valueAsDate||new Date();
  var y=d.getFullYear(),m=d.getMonth()+1,dt=d.getDate(),wd=d.getDay();
  var formats={
    'ISO 8601':d.toISOString().split('T')[0],
    'US 美式':monthsShort[m-1]+' '+dt+', '+y,
    'US full 美式完整':weekdays[wd]+', '+months[m-1]+' '+dt+', '+y,
    'UK 英式':dt+' '+monthsShort[m-1]+' '+y,
    'UK full 英式完整':weekdays[wd]+' '+dt+' '+months[m-1]+' '+y,
    '中文 Chinese':y+'年'+m+'月'+dt+'日',
    '中文带星期':y+'年'+m+'月'+dt+'日 '+weekdays[wd],
    'YY/MM/DD':String(y).slice(2)+'/'+String(m).padStart(2,'0')+'/'+String(dt).padStart(2,'0'),
    'DD/MM/YYYY':String(dt).padStart(2,'0')+'/'+String(m).padStart(2,'0')+'/'+y,
    'MM/DD/YYYY':String(m).padStart(2,'0')+'/'+String(dt).padStart(2,'0')+'/'+y,
    'Unix Timestamp':Math.floor(d.getTime()/1000)
  };
  var html='';
  for(var k in formats){
    html+='<div style="display:flex;justify-content:space-between;border-bottom:1px solid #f1f5f9;padding:2px 0;">'+
      '<span style="color:var(--text-en);">'+k+'</span><strong>'+formats[k]+'</strong></div>';
  }
  document.getElementById('output').innerHTML=html;
}
</script></body></html>
