var diceCount=1,results=[],rolling=false,hist=JSON.parse(localStorage.getItem('dice_hist')||'[]');
var dotMap={1:['dot-1'],2:['dot-2a','dot-2b'],3:['dot-3a','dot-3b','dot-3c'],4:['dot-4a','dot-4b','dot-4c','dot-4d'],5:['dot-5a','dot-5b','dot-5c','dot-5d','dot-5e'],6:['dot-6a','dot-6b','dot-6c','dot-6d','dot-6e','dot-6f']};

function setCount(n,btn){
  diceCount=n;document.querySelectorAll('.dice-count-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderDice();
}

function renderDice(){
  var box=document.getElementById('diceBox');box.innerHTML='';
  for(var i=0;i<diceCount;i++){
    var d=document.createElement('div');d.className='dice'+(rolling?' rolling':'');
    for(var j=0;j<9;j++){var dot=document.createElement('div');dot.className='dot';dot.style.opacity='0';d.appendChild(dot);}
    if(results[i]){
      var dots=dotMap[results[i]]||[];
      var children=d.children;
      for(var k=0;k<9;k++){children[k].style.opacity='0';}
      dots.forEach(function(cls){
        var idx=parseInt(cls.split('-')[1].slice(-1))-1;
        var posMap={a:0,b:2,c:3,d:5,e:6,f:8};
        var col=cls.slice(-1);
        if(posMap[col]!==undefined)children[posMap[col]].style.opacity='1';
      });
    }
    box.appendChild(d);
  }
}

function roll(){
  if(rolling)return;rolling=true;results=[];
  for(var i=0;i<diceCount;i++)results.push(Math.floor(Math.random()*6)+1);
  renderDice();
  setTimeout(function(){
    rolling=false;renderDice();
    var sum=results.reduce(function(a,b){return a+b;},0);
    document.getElementById('sumText').textContent='总和 Sum：'+sum+' （'+results.join(' + ')+' = '+sum+'）';
    hist.unshift({dice:results.join(','),sum:sum,time:new Date().toLocaleString('zh-CN')});
    if(hist.length>50)hist.length=50;
    localStorage.setItem('dice_hist',JSON.stringify(hist));showHist();
  },600);
}

function showHist(){
  var h=document.getElementById('history');
  if(!h)return;
  if(!hist.length){h.innerHTML='<div style="color:var(--text-en);font-size:.82rem;">摇骰后显示记录 Roll to see history</div>';return;}
