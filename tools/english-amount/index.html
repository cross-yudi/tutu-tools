<script>
var ones = ['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
var tens = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
var currencyNames = {usd:{main:'dollar',sub:'cent',mainPl:'dollars',subPl:'cents'},eur:{main:'euro',sub:'cent',mainPl:'euros',subPl:'cents'},gbp:{main:'pound',sub:'pence',mainPl:'pounds',subPl:'pence'}};

function numToWords(n) {
  if (n === 0) return 'zero';
  function chunk(num) {
    var words = '';
    if (num >= 100) { words += ones[Math.floor(num/100)] + ' hundred '; num %= 100; }
    if (num >= 20) { words += tens[Math.floor(num/10)] + ' '; num %= 10; if (num > 0) words += ones[num] + ' '; }
    else if (num > 0) { words += ones[num] + ' '; }
    return words;
  }
  var result = '';
  if (n >= 1000000000) { result += chunk(Math.floor(n/1000000000)) + 'billion '; n %= 1000000000; }
  if (n >= 1000000) { result += chunk(Math.floor(n/1000000)) + 'million '; n %= 1000000; }
  if (n >= 1000) { result += chunk(Math.floor(n/1000)) + 'thousand '; n %= 1000; }
  result += chunk(n);
  return result.trim();
}

function convert() {
  var val = parseFloat(document.getElementById('amount').value);
  if (isNaN(val) || val < 0) { document.getElementById('output').textContent = '请输入有效金额 Enter a valid amount'; return; }
  var cur = currencyNames[document.getElementById('currency').value];
  var intPart = Math.floor(val);
  var decPart = Math.round((val - intPart) * 100);
  var result = numToWords(intPart);
  result = result.charAt(0).toUpperCase() + result.slice(1);
  result += ' ' + (intPart === 1 ? cur.main : cur.mainPl);
  if (decPart > 0) {
    result += ' and ' + numToWords(decPart) + ' ' + (decPart === 1 ? cur.sub : cur.subPl);
  }
  result += ' only';
  document.getElementById('output').textContent = result;
}
</script>
