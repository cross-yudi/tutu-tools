function generate(){
  var text=document.getElementById('input').value;
  if(!text){document.getElementById('output').innerHTML='';return;}
  var alpha='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var html='';
  for(var name in fonts){
    var converted=text.split('').map(function(c){
      var idx=alpha.indexOf(c);
      return idx>=0?fonts[name].charAt(idx)||c:c;
    }).join('');
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;">'+

      '<button class="btn btn-outline btn-sm" onclick="copyText(this.parentElement.querySelector(\'div\').textContent)">复制</button></div>';
  }
