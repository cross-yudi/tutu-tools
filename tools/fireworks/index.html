var c=document.getElementById('c'),ctx=c.getContext('2d'),W=700,H=450,particles=[],fireworkCount=0,animId;

function Particle(x,y,vx,vy,color,life,size){
  this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.life=life;this.maxLife=life;this.size=size||2;
}

function launch(x,y){
  var colors=['#ef4444','#f59e0b','#fbbf24','#10b981','#3b82f6','#8b5cf6','#ec4899','#f97316','#14b8a6','#e11d48','#d946ef','#f43f5e'];
  var baseColor=colors[Math.floor(Math.random()*colors.length)];
  var count=80+Math.floor(Math.random()*60);
  for(var i=0;i<count;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=2+Math.random()*6;
    var life=40+Math.random()*50;
    var pColor=Math.random()>.3?baseColor:colors[Math.floor(Math.random()*colors.length)];
    particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,pColor,life,1.5+Math.random()*2.5));
  }
  fireworkCount++;document.getElementById('count').textContent=fireworkCount;
}

function loop(){
  ctx.fillStyle='rgba(10,10,30,.25)';ctx.fillRect(0,0,W,H);
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    var alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  animId=requestAnimationFrame(loop);
}

c.addEventListener('click',function(e){var rect=c.getBoundingClientRect();launch(e.clientX-rect.left,(e.clientY-rect.top));});
c.addEventListener('touchstart',function(e){e.preventDefault();var rect=c.getBoundingClientRect();launch(e.touches[0].clientX-rect.left,e.touches[0].clientY-rect.top);});

function autoFire(){
  var count=0;var timer=setInterval(function(){var x=100+Math.random()*(W-200);var y=100+Math.random()*200;launch(x,y);count++;if(count>=10){clearInterval(timer);}},400);
}

function clearSky(){particles=[];fireworkCount=0;document.getElementById('count').textContent='0';}

loop();
</script></body></html>
