var c=document.getElementById('c'),ctx=c.getContext('2d'),W=400,H=500,basket={x:170,w:60,h:12},fruits=[],score=0,gameOver=false,animId;
var fruitEmojis=['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🍌','🍐','🥝'];
function init(){basket.x=170;fruits=[];score=0;gameOver=false;document.getElementById('score').textContent='0';if(animId)cancelAnimationFrame(animId);loop();}
function spawn(){if(Math.random()<0.02){fruits.push({x:Math.random()*(W-20)+10,y:-20,speed:1.5+Math.random()*2,emoji:fruitEmojis[Math.floor(Math.random()*fruitEmojis.length)],r:14});}}
function loop(){if(gameOver)return;ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  spawn();
  // Draw basket
  var bx=basket.x,by=H-30,bw=basket.w,bh=18;
  // Basket body (trapezoid)
  ctx.fillStyle='#d4a574';ctx.beginPath();ctx.moveTo(bx+4,by+bh);ctx.lineTo(bx-4,by+4);ctx.lineTo(bx+bw+4,by+4);ctx.lineTo(bx+bw-4,by+bh);ctx.closePath();ctx.fill();
  // Basket rim
  ctx.fillStyle='#b87333';ctx.fillRect(bx-6,by,bw+12,6);
  // Weave lines
  ctx.strokeStyle='#c08550';ctx.lineWidth=1;
  for(var j=1;j<=2;j++){ctx.beginPath();ctx.moveTo(bx+2,by+4+j*5);ctx.lineTo(bx+bw-2,by+4+j*5);ctx.stroke();}
  // Handle
  ctx.strokeStyle='#8b5e3c';ctx.lineWidth=3;ctx.beginPath();ctx.arc(bx+bw/2,by,24,Math.PI,0);ctx.stroke();
  for(var i=fruits.length-1;i>=0;i--){var f=fruits[i];f.y+=f.speed;ctx.font='28px sans-serif';ctx.textAlign='center';ctx.fillText(f.emoji,f.x,f.y);
    if(f.y>H-45&&f.y<H-10&&Math.abs(f.x-basket.x-basket.w/2)<basket.w/2+15){score+=10;document.getElementById('score').textContent=score;fruits.splice(i,1);}
    else if(f.y>H){gameOver=true;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('Game Over',W/2,H/2-10);ctx.fillText('Score: '+score,W/2,H/2+30);}
  }
  animId=requestAnimationFrame(loop);
}
c.addEventListener('mousemove',function(e){var rect=c.getBoundingClientRect();basket.x=(e.clientX-rect.left)*(W/rect.width)-basket.w/2;if(basket.x<0)basket.x=0;if(basket.x>W-basket.w)basket.x=W-basket.w;});
c.addEventListener('touchmove',function(e){e.preventDefault();var rect=c.getBoundingClientRect();basket.x=(e.touches[0].clientX-rect.left)*(W/rect.width)-basket.w/2;if(basket.x<0)basket.x=0;if(basket.x>W-basket.w)basket.x=W-basket.w;});
c.addEventListener('click',function(){if(gameOver)init();});
init();
</script></body></html>
