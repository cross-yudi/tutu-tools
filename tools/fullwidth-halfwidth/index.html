          <button class="btn btn-primary" onclick="convert('toHalf')">全角→半角 Full→Half</button>

<script>
function convert(type) {
  var text = document.getElementById('input').value;
  var result = '';
  for (var i = 0; i < text.length; i++) {
    var code = text.charCodeAt(i);
    if (type === 'toHalf') {
      if (code === 0x3000) { result += ' '; }
      else if (code >= 0xFF01 && code <= 0xFF5E) { result += String.fromCharCode(code - 0xFEE0); }
      else { result += text[i]; }
    } else {
      if (code === 0x20) { result += String.fromCharCode(0x3000); }
      else if (code >= 0x21 && code <= 0x7E) { result += String.fromCharCode(code + 0xFEE0); }
      else { result += text[i]; }
    }
  }
  document.getElementById('output').textContent = result;
  document.getElementById('infoTip').textContent = '字符数 Chars: ' + result.length;
}
</script>
