<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>五子棋 Gomoku - 兔兔工具站</title><meta name="description" content="经典五子棋游戏，人机对战。Classic Gomoku — play against AI."><meta name="keywords" content="五子棋,gomoku,五子连珠,棋类游戏"><link rel="stylesheet" href="../../css/style.css"><style>#goban{display:grid;grid-template-columns:repeat(15,24px);gap:0;margin:0 auto;width:fit-content;background:#dcb35c;padding:8px;border-radius:8px;}.go-cell{width:24px;height:24px;background:#dcb35c;border:1px solid #c9a040;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}.go-cell:hover{background:#c9a040;}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 五子棋</div><h2>♟️ 五子棋</h2><p class="desc">经典五子棋，你先手⚫，AI后手⚪</p><p class="desc-en">Gomoku — you play black, AI plays white</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;"><label>状态 <span class="label-en">Status</span></label><div style="font-size:1.2rem;margin:8px 0;" id="status">你的回合 Your turn ⚫</div><div id="goban"></div><button class="btn btn-primary" style="margin-top:10px;" onclick="init()">🔄 重新开始 Restart</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var board=[],gameOver=false,playerTurn=true;
function init(){board=[];for(var r=0;r<15;r++){board[r]=[];for(var c=0;c<15;c++)board[r][c]=0;}gameOver=false;playerTurn=true;document.getElementById('status').textContent='你的回合 Your turn ⚫';render();}
function render(){var g=document.getElementById('goban');g.innerHTML='';for(var r=0;r<15;r++)for(var c=0;c<15;c++){var cell=document.createElement('div');cell.className='go-cell';cell.textContent=board[r][c]===1?'⚫':board[r][c]===2?'⚪':'';cell.onclick=function(r,c){return function(){if(gameOver||!playerTurn)return;if(board[r][c]!==0)return;board[r][c]=1;playerTurn=false;render();if(checkWin(1)){document.getElementById('status').textContent='🎉 你赢了！You Win!';gameOver=true;return;}if(isDraw()){document.getElementById('status').textContent='平局 Draw!';gameOver=true;return;}document.getElementById('status').textContent='AI思考中... AI thinking...';setTimeout(aiMove,200);}}(r,c);g.appendChild(cell);}}
function checkWin(p){for(var r=0;r<15;r++)for(var c=0;c<15;c++){if(c<11&&board[r][c]===p&&board[r][c+1]===p&&board[r][c+2]===p&&board[r][c+3]===p&&board[r][c+4]===p)return true;if(r<11&&board[r][c]===p&&board[r+1][c]===p&&board[r+2][c]===p&&board[r+3][c]===p&&board[r+4][c]===p)return true;if(r<11&&c<11&&board[r][c]===p&&board[r+1][c+1]===p&&board[r+2][c+2]===p&&board[r+3][c+3]===p&&board[r+4][c+4]===p)return true;if(r>=4&&c<11&&board[r][c]===p&&board[r-1][c+1]===p&&board[r-2][c+2]===p&&board[r-3][c+3]===p&&board[r-4][c+4]===p)return true;}return false;}
function isDraw(){for(var r=0;r<15;r++)for(var c=0;c<15;c++)if(board[r][c]===0)return false;return true;}
function aiMove(){if(gameOver)return;var best={r:7,c:7,score:-Infinity};for(var r=0;r<15;r++)for(var c=0;c<15;c++)if(board[r][c]===0){board[r][c]=2;var s=evaluate(2)-evaluate(1);if(s>best.score){best={r:r,c:c,score:s};}board[r][c]=0;}
board[best.r][best.c]=2;playerTurn=true;render();if(checkWin(2)){document.getElementById('status').textContent='😢 AI赢了！AI Wins!';gameOver=true;}else if(isDraw()){document.getElementById('status').textContent='平局 Draw!';gameOver=true;}else{document.getElementById('status').textContent='你的回合 Your turn ⚫';}}
function evaluate(p){var score=0;for(var r=0;r<15;r++)for(var c=0;c<15;c++){if(board[r][c]===p){score+=countDir(r,c,p,1,0)+countDir(r,c,p,0,1)+countDir(r,c,p,1,1)+countDir(r,c,p,1,-1);}}return score;}
function countDir(r,c,p,dr,dc){var count=0;for(var i=1;i<5;i++){var nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<15&&nc>=0&&nc<15&&board[nr][nc]===p)count++;else break;}return count*count;}
init();
</script></body></html>
