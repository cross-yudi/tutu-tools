<script>
function makeUUID(){
  var arr=new Uint8Array(16);
  crypto.getRandomValues(arr);
  arr[6]=(arr[6]&0x0f)|0x40; // version 4
  arr[8]=(arr[8]&0x3f)|0x80; // variant
  var hex=Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  return hex;
}
function formatUUID(uuid,format){
  var s=uuid;
  var dashed=s.slice(0,8)+'-'+s.slice(8,12)+'-'+s.slice(12,16)+'-'+s.slice(16,20)+'-'+s.slice(20);
  switch(format){
    case 'upper':return dashed.toUpperCase();
    case 'nohyphen':return uuid;
    case 'braces':return '{'+dashed+'}';
    case 'urn':return 'urn:uuid:'+dashed;
    case 'hex':return '0x'+uuid;
    default:return dashed;
  }
}
function generate(){
  var fmt=document.getElementById('format').value;
  var count=parseInt(document.getElementById('count').value)||5;
  var results=[];
  for(var i=0;i<count;i++)results.push(formatUUID(makeUUID(),fmt));
  document.getElementById('output').innerHTML=results.map(function(r,i){return (i+1)+'. '+r;}).join('<br>');
  document.getElementById('infoTip').textContent=count+' 个 GUIDs generated';
}
function generateOne(){
  var fmt=document.getElementById('format').value;
  var uuid=formatUUID(makeUUID(),fmt);
  document.getElementById('output').innerHTML='<strong>'+uuid+'</strong>';
  document.getElementById('infoTip').textContent='1 GUID generated';
}
