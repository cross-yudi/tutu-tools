<script>
var selfClosing=['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr'];

function beautify(){
  var html=document.getElementById('input').value;
  html=html.replace(/>\s*</g,'><');
  var result='',indent=0,inTag=false,inClosing=false,inPre=false,inStyle=false,inScript=false;
  for(var i=0;i<html.length;i++){
    var c=html[i];
    if(c==='<'){
      if(!inPre&&!inStyle&&!inScript){result+='\n'+'  '.repeat(indent);}
      inTag=true;inClosing=false;
      var tag='',j=i+1;
      while(j<html.length&&!/[\s>]/.test(html[j])){tag+=html[j];j++;}
      tag=tag.toLowerCase();
      if(tag==='pre')inPre=true;
      else if(tag==='style')inStyle=true;
      else if(tag==='script')inScript=true;
      if(html[i+1]==='/'){inClosing=true;indent--;if(indent<0)indent=0;}
    }
    result+=c;
    if(c==='>'){
      inTag=false;
      if(!inClosing&&!inPre&&!inStyle&&!inScript){
        var tagContent=result.slice(result.lastIndexOf('<'));
        var tagMatch=tagContent.match(/<\/?(\w+)/);
        if(tagMatch){
          var t=tagMatch[1].toLowerCase();
          if(selfClosing.indexOf(t)<0&&tagContent.indexOf('/>')<0){indent++;}}
      }
      if(inClosing){
        var closeTag=result.slice(result.lastIndexOf('</'));
        if(closeTag.match(/<\/(pre|style|script)>/)){
          if(closeTag.indexOf('pre')>0)inPre=false;
          if(closeTag.indexOf('style')>0)inStyle=false;
          if(closeTag.indexOf('script')>0)inScript=false;
        }
      }
      inClosing=false;
    }
  }
  document.getElementById('output').textContent=result.trim();
  document.getElementById('infoTip').textContent='已美化 Beautified | '+result.trim().length+' 字符 chars';
}
function minify(){
  var html=document.getElementById('input').value;
  html=html.replace(/<!--[\s\S]*?-->/g,'');
  html=html.replace(/>\s+</g,'><');
  html=html.replace(/\s+/g,' ');
  html=html.replace(/\s*([<>])\s*/g,'$1');
  document.getElementById('output').textContent=html.trim();
  document.getElementById('infoTip').textContent='已压缩 Minified | '+html.trim().length+' 字符 chars';
}
</script>
