function randIPv4(){
  return Math.floor(Math.random()*223+1)+'.'+Math.floor(Math.random()*256)+'.'+Math.floor(Math.random()*256)+'.'+Math.floor(Math.random()*254+1);
}

function randIPv6(){
  var segments=[];
  for(var i=0;i<8;i++){segments.push(Math.floor(Math.random()*65536).toString(16));}
  return segments.join(':');
}

function generate(){
  var type=document.getElementById('type').value;
  var count=parseInt(document.getElementById('count').value)||10;
  var results=[];
  for(var i=0;i<count;i++){
    if(type==='v4')results.push(randIPv4());
    else if(type==='v6')results.push(randIPv6());
    else results.push(i%2===0?randIPv4():randIPv6());
  }
  document.getElementById('output').innerHTML=results.map(function(ip,i){return (i+1)+'. '+ip;}).join('<br>');
}

generate();
