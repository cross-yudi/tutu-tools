<script>
function beautify(){
  var code=document.getElementById('input').value;
  var indent=0,result='',inStr=false,strChar='',inComment=false,inBlockComment=false;
  for(var i=0;i<code.length;i++){
    var c=code[i], nc=code[i+1]||'';
    if(inStr){result+=c;if(c===strChar&&code[i-1]!=='\\')inStr=false;continue;}
    if(inBlockComment){result+=c;if(c==='*'&&nc==='/'){inBlockComment=false;result+='/';i++;}continue;}
    if(inComment){result+=c;if(c==='\n'){inComment=false;}continue;}
    if(c==='/'&&nc==='*'){inBlockComment=true;result+='/*';i++;continue;}
    if(c==='/'&&nc==='/'){inComment=true;result+='//';i++;continue;}
    if(c==='"'||c==="'"||c==='`'){inStr=true;strChar=c;result+=c;continue;}
    if(c==='{'||c==='['){result+=c+'\n';indent++;result+='  '.repeat(indent);continue;}
    if(c==='}'||c===']'){indent--;result=result.trimEnd()+'\n'+'  '.repeat(indent)+c;continue;}
    if(c===','&&!/\d/.test(nc)){result+=c+'\n'+'  '.repeat(indent);continue;}
    if(c===';'&&nc!==' '&&nc!=='\n'){result+=c+'\n'+'  '.repeat(indent);continue;}
    result+=c;
  }
  document.getElementById('output').textContent=result;
  document.getElementById('infoTip').textContent='已格式化 Beautified | '+result.length+' 字符 chars';
}
function minify(){
  var code=document.getElementById('input').value;
  var result='',inStr=false,inBlockComment=false,inLineComment=false;
  for(var i=0;i<code.length;i++){
    var c=code[i];
    if(inStr){result+=c;if(c==='\\'){result+=code[++i];}else if((c==='"'||c==="'"||c==='`')&&!inStr){}else if(c===inStr.strChar&&!inStr.escaped){inStr=false;}inStr.escaped=inStr&&c==='\\';continue;}
    if(inStr){result+=c;continue;}
    if(inBlockComment){if(c==='*'&&code[i+1]==='/'){inBlockComment=false;i++;}continue;}
    if(inLineComment){if(c==='\n'){inLineComment=false;result+=c;}continue;}
    if(c==='/'&&code[i+1]==='*'){inBlockComment=true;i++;continue;}
    if(c==='/'&&code[i+1]==='/'){inLineComment=true;i++;continue;}
    if(c==='"'||c==="'"||c==='`'){inStr={strChar:c,escaped:false};result+=c;continue;}
    if(/\s/.test(c)){if(result&&!/\s$/.test(result)&&!/[{};,:]/.test(result[result.length-1])){result+=' ';}continue;}
    result+=c;
  }
  document.getElementById('output').textContent=result.trim();
  document.getElementById('infoTip').textContent='已压缩 Minified | '+result.trim().length+' 字符 chars';
}
