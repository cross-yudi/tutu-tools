<div class="tool-panel"><label>JSON 输入 <span class="label-en">Input</span></label><textarea id="input" placeholder='{"name":"Tutu","items":[1,2,3]}' style="min-height:120px;"></textarea>
<div class="btn-row" style="margin-top:8px;"><button class="btn btn-primary" onclick="loadJSON()">加载 Load</button><button class="btn btn-outline" onclick="showJSON()">显示JSON Show JSON</button></div></div>
<div class="tool-panel"><label>树形编辑 <span class="label-en">Tree Editor</span></label><div class="result-area" id="tree" style="min-height:200px;max-height:400px;overflow:auto;"></div>

<script src="../../js/common.js?v=4"></script>
<script>
var currentData={};
function loadJSON(){
  try{currentData=JSON.parse(document.getElementById('input').value);renderTree();}
  catch(e){showToast('JSON格式错误 Invalid JSON');}
}
function showJSON(){
  document.getElementById('input').value=JSON.stringify(currentData,null,2);
  showToast('已生成JSON JSON generated');
}
function renderTree(){
  document.getElementById('tree').innerHTML=renderNode(currentData,'root',true);
}
function renderNode(obj,key,isRoot){
  if(obj===null)return '<span style="color:#808080;">null</span>';
  if(typeof obj!=='object'){
    var cls=typeof obj==='string'?'json-string':typeof obj==='number'?'json-number':typeof obj==='boolean'?'json-bool':'json-null';
    return '<span class="'+cls+'">'+JSON.stringify(obj)+'</span>';
  }
  var isArr=Array.isArray(obj);
  var html='<div'+ (isRoot?'':' class="json-node"')+'>';
  html+='<strong>'+(key||'root')+'</strong> <span style="color:var(--text-en);font-size:.75rem;">'+(isArr?'[ ]':'{ }')+'</span>';
  var keys=Object.keys(obj);
  keys.forEach(function(k){
    html+='<div style="margin:2px 0;"><span class="json-key">'+k+'</span>: ';
    html+=renderNode(obj[k],k,false);
    html+='<button class="btn-xs" onclick="deleteKey(\''+k+'\')">×</button></div>';
  });
  if(!isArr){
    html+='<div style="margin-top:4px;"><input id="newKey" placeholder="键 key" style="width:70px;padding:3px 6px;font-size:.75rem;border:1px solid var(--border);border-radius:4px;">'+
    '<input id="newVal" placeholder="值 value" style="width:70px;padding:3px 6px;font-size:.75rem;border:1px solid var(--border);border-radius:4px;margin-left:4px;">'+
    '<button class="btn-xs" onclick="addKey()" style="background:var(--primary);color:#fff;">+ 添加 Add</button></div>';
  }
  html+='</div>';return html;
}
function deleteKey(k){delete currentData[k];renderTree();}
function addKey(){
  var k=document.getElementById('newKey').value.trim();
  var v=document.getElementById('newVal').value.trim();
  if(!k){showToast('请输入键名 Enter key name');return;}
  try{currentData[k]=JSON.parse(v);}catch(e){currentData[k]=v;}
  renderTree();
  document.getElementById('input').value=JSON.stringify(currentData,null,2);
}
</script>
