<script>
function getType(val,seen){
  if(val===null)return 'null';
  if(val===undefined)return 'undefined';
  if(typeof val==='string')return 'string';
  if(typeof val==='number')return 'number';
  if(typeof val==='boolean')return 'boolean';
  if(Array.isArray(val)){
    if(val.length===0)return 'any[]';
    var types=val.map(function(v){return getType(v,seen);});
    var unique=types.filter(function(v,i,a){return a.indexOf(v)===i;});
    return unique.length===1?unique[0]+'[]':'('+unique.join(' | ')+')[]';
  }
  if(typeof val==='object'){
    var result='{\n';
    Object.keys(val).forEach(function(k){
      result+='  '+k+(k.includes('-')||k.includes(' ')?'':''); // handle special keys
      result+=': '+getType(val[k],seen)+';\n';
    });
    result+='}';
    return result;
  }
  return 'any';
}

function convert(){
  try{
    var json=JSON.parse(document.getElementById('input').value);
    var rootName=document.getElementById('rootName').value||'Root';
    var output='interface '+rootName+' '+getType(json,{});
    output=output.replace(/\n\}/,'\n}');
    document.getElementById('output').textContent=output;
    document.getElementById('infoTip').textContent='✅ 已生成 Generated';
  }catch(e){
    document.getElementById('output').textContent='❌ JSON格式错误: '+e.message;
    document.getElementById('infoTip').textContent='❌ 无效 Invalid';
  }
}
</script>
