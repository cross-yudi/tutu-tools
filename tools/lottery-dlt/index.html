btn btn-outline btn-sm" style="margin-top:6px;" onclick="clearHist()">清空 Clear</button></div></div></main><footer class="footer"><p style="margin-bottom:4px;font-size:.78rem;">兔兔在线工具站 — 免费在线工具集合，无需下载安装，打开即用。Tutu Tools — free online tools, no download required.</p>© 2026 兔兔在线工具站 Tutu Tools — 联系 Contact: gubaby@proton.me</footer><script src="../../js/common.js?v=3"></script><script>
var hist=JSON.parse(localStorage.getItem('dlt_hist')||'[]');
function randUnique(min,max,count){var arr=[];while(arr.length<count){var n=Math.floor(Math.random()*(max-min+1))+min;if(arr.indexOf(n)<0)arr.push(n);}return arr.sort(function(a,b){return a-b;});}

function generate(num){
  var results=[];
  for(var i=0;i<num;i++){
    var fronts=randUnique(1,35,5);
    var backs=randUnique(1,12,2);
    results.push({fronts:fronts,backs:backs});
  }
  showResults(results);
  if(num===1){
    var r=results[0];
    hist.unshift({fronts:r.fronts.join(','),backs:r.backs.join(','),time:new Date().toLocaleString('zh-CN')});
    if(hist.length>50)hist.length=50;
    localStorage.setItem('dlt_hist',JSON.stringify(hist));
    showHist();
  }
}

function showResults(results){
  var ballHtml='',infoHtml='';
  results.forEach(function(r,i){
    var row='<div style="margin:8px 0;">'+(results.length>1?'<span style="font-size:.8rem;color:var(--text-en);">'+(i+1)+'注</span> ':'');
    r.fronts.forEach(function(n){row+='<span class="ball front">'+String(n).padStart(2,'0')+'</span>';});
    r.backs.forEach(function(n){row+='<span class="ball back">'+String(n).padStart(2,'0')+'</span>';});
    row+='</div>';ballHtml+=row;
  });
  document.getElementById('balls').innerHTML=ballHtml;
  if(results.length===1){
    document.getElementById('info').textContent='前区 Front：'+results[0].fronts.join(', ')+' | 后区 Back：'+results[0].backs.join(', ');
  }else{
    document.getElementById('info').textContent='已生成 '+results.length+' 注';
  }
}

function showHist(){
  var h=document.getElementById('history');
  if(!hist.length){h.innerHTML='<div style="color:var(--text-en);font-size:.82rem;">生成后显示记录</div>';return;}
  h.innerHTML='<div style="font-size:.78rem;color:var(--primary-dark);margin-bottom:4px;">共 '+hist.length+' 注 Total</div>'+hist.map(function(item,i){return '<div style="padding:3px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;">'+(i+1)+'. 🔴'+item.fronts+' 🔵'+item.backs+' <span style="color:var(--text-en);font-size:.7rem;">'+item.time+'</span></div>';}).join('');
}

function clearHist(){hist=[];localStorage.setItem('dlt_hist','[]');showHist();}
generate(1);showHist();
</script></body></html>
