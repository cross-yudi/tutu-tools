<script>
function randUnique(min,max,count){var arr=[];while(arr.length<count){var n=Math.floor(Math.random()*(max-min+1))+min;if(arr.indexOf(n)<0)arr.push(n);}return arr.sort(function(a,b){return a-b;});}

function generate(num){
  var results=[];
  for(var i=0;i<num;i++){
    var reds=randUnique(1,33,6);
    var blue=Math.floor(Math.random()*16)+1;
    results.push({reds:reds,blue:blue});
  }
  showResults(results);
  if(num===1){
    var r=results[0];
    hist.unshift({reds:r.reds.join(','),blue:r.blue,time:new Date().toLocaleString('zh-CN')});
    if(hist.length>50)hist.length=50;
    localStorage.setItem('ssq_hist',JSON.stringify(hist));
    showHist();
  }
}

function showResults(results){
  var ballHtml='',infoHtml='';
  results.forEach(function(r,i){
    var row='<div style="margin:8px 0;">'+(results.length>1?'<span style="font-size:.8rem;color:var(--text-en);">'+(i+1)+'注</span> ':'');
    r.reds.forEach(function(n){row+='<span class="ball red">'+String(n).padStart(2,'0')+'</span>';});
    row+='<span class="ball blue">'+String(r.blue).padStart(2,'0')+'</span></div>';
    ballHtml+=row;
  });
  document.getElementById('balls').innerHTML=ballHtml;
  if(results.length===1){
    document.getElementById('info').textContent='红球 Red：'+results[0].reds.join(', ')+' | 蓝球 Blue：'+results[0].blue;
  }else{
    document.getElementById('info').textContent='已生成 '+results.length+' 注';
  }
}

function showHist(){
  var h=document.getElementById('history');
  if(!hist.length){h.innerHTML='<div style="color:var(--text-en);font-size:.82rem;">生成后显示记录</div>';return;}
  h.innerHTML='<div style="font-size:.78rem;color:var(--primary-dark);margin-bottom:4px;">共 '+hist.length+' 注 Total</div>'+hist.map(function(item,i){return '<div style="padding:3px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;">'+(i+1)+'. 🔴'+item.reds+' 🔵'+item.blue+' <span style="color:var(--text-en);font-size:.7rem;">'+item.time+'</span></div>';}).join('');
}

function clearHist(){hist=[];localStorage.setItem('ssq_hist','[]');showHist();}
