function isChinese(c){return /[一-鿿]/.test(c);}

function convert(type){
  var val=document.getElementById('input').value.trim();
  var result='';
  if(type==='encode'){
    var chars=val.split('');
    result=chars.map(function(c){
      if(c===' ')return '/';
      if(c==='\n')return '\n';
      if(isChinese(c)){
        var py=pinyinMap[c]||c;
        return py.toUpperCase().split('').map(function(l){return morseMap[l]||l;}).join(' ');
      }
      return morseMap[c.toUpperCase()]||c;
    }).join(' ');
  } else {
    var words=val.split('/');
    result=words.map(function(w){
      return w.trim().split(/\s+/).map(function(code){return reverseMorse[code]||code;}).join('');
    }).join(' ');
  }
  document.getElementById('output').textContent=result;
  var hasCN=/[一-鿿]/.test(val);
