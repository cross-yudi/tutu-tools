var hist=JSON.parse(localStorage.getItem('picker_hist')||'[]');
function pick(){
  var raw=document.getElementById('names').value;
  var names=raw.split(/[\n\r]+/).filter(function(l){return l.trim();});
  if(!names.length){showToast('请输入名单 Enter names');return;}
  var count=Math.min(parseInt(document.getElementById('count').value)||1,names.length);

  if(hist.length>30)hist.length=30;
  localStorage.setItem('picker_hist',JSON.stringify(hist));showHist();
}
function showHist(){
  var h=document.getElementById('history');
  if(!hist.length){h.innerHTML='<div style="color:var(--text-en);font-size:.82rem;">点名后显示记录</div>';return;}

function clearHist(){hist=[];localStorage.setItem('picker_hist','[]');showHist();}
showHist();
