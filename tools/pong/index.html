<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>乒乓球 Pong - 兔兔工具站</title><meta name="description" content="经典乒乓球对战AI。Classic Pong game vs AI."><meta name="keywords" content="乒乓球,pong,经典游戏"><link rel="stylesheet" href="../../css/style.css"><style>canvas{border:2px solid var(--border);border-radius:8px;display:block;margin:0 auto;background:#1a1a2e;}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 乒乓球</div><h2>🏓 乒乓球</h2><p class="desc">鼠标上下移动球拍，对战AI</p><p class="desc-en">Pong — move paddle with mouse, play against AI</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;"><div>你 <strong id="pScore">0</strong> - <strong id="aScore">0</strong> AI</div><canvas id="c" width="500" height="350"></canvas><p style="font-size:.75rem;color:var(--text-en);">鼠标上下移动 Move mouse up/down</p><button class="btn btn-primary" style="margin-top:8px;" onclick="init()">重新开始 Restart</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var c=document.getElementById('c'),ctx=c.getContext('2d'),W=500,H=350,animId;
var paddleH=56,paddleW=10,p1={x:20,y:H/2-paddleH/2,score:0},p2={x:W-30,y:H/2-paddleH/2,score:0},ball={x:W/2,y:H/2,vx:4,vy:2,r:7},speed=4;
function init(){p1.y=H/2-paddleH/2;p2.y=H/2-paddleH/2;ball.x=W/2;ball.y=H/2;speed=4;ball.vx=4*(Math.random()>.5?1:-1);ball.vy=(Math.random()-.5)*3;p1.score=0;p2.score=0;updateScore();if(animId)cancelAnimationFrame(animId);loop();}
function loop(){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#ffffff22';ctx.setLineDash([8,12]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y-ball.r<0||ball.y+ball.r>H)ball.vy*=-1;
  if(ball.x-ball.r<p1.x+paddleW&&ball.y>p1.y&&ball.y<p1.y+paddleH){ball.vx=Math.abs(ball.vx)*1.03;ball.x=p1.x+paddleW+ball.r;var dy=ball.y-(p1.y+paddleH/2);ball.vy+=dy*.15;}
  if(ball.x+ball.r>p2.x&&ball.y>p2.y&&ball.y<p2.y+paddleH){ball.vx=-Math.abs(ball.vx)*1.03;ball.x=p2.x-ball.r;var dy=ball.y-(p2.y+paddleH/2);ball.vy+=dy*.15;}
  if(ball.x<0){p2.score++;updateScore();ball.x=W/2;ball.y=H/2;speed=4;ball.vx=4;ball.vy=(Math.random()-.5)*3;}
  if(ball.x>W){p1.score++;updateScore();ball.x=W/2;ball.y=H/2;speed=4;ball.vx=-4;ball.vy=(Math.random()-.5)*3;}
  // AI
  var targetY=ball.y-paddleH/2;if(p2.y+paddleH/2<ball.y)p2.y+=3;else if(p2.y+paddleH/2>ball.y)p2.y-=3;if(p2.y<0)p2.y=0;if(p2.y>H-paddleH)p2.y=H-paddleH;
  // Player paddle (table tennis bat shape)
  drawPaddle(p1.x,p1.y,paddleW,paddleH,'#10b981','left');
  // AI paddle
  drawPaddle(p2.x,p2.y,paddleW,paddleH,'#ef4444','right');
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  animId=requestAnimationFrame(loop);
}
function drawPaddle(x,y,w,h,color,side){
  ctx.fillStyle=color;
  // Handle
  var hx=side==='left'?x+w-4:x;
  ctx.fillRect(hx,y+h*.25,4,h*.5);
  // Blade (rounded rectangle)
  var bx=side==='left'?x:x+4;
  var bw=w-4,br=4;
  ctx.beginPath();ctx.moveTo(bx+br,y);ctx.lineTo(bx+bw-br,y);ctx.quadraticCurveTo(bx+bw,y,bx+bw,y+br);ctx.lineTo(bx+bw,y+h-br);ctx.quadraticCurveTo(bx+bw,y+h,bx+bw-br,y+h);ctx.lineTo(bx+br,y+h);ctx.quadraticCurveTo(bx,y+h,bx,y+h-br);ctx.lineTo(bx,y+br);ctx.quadraticCurveTo(bx,y,bx+br,y);ctx.closePath();ctx.fill();
  // Rubber surface highlight
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(bx+2,y+3,bw-4,h-7);
}
function updateScore(){document.getElementById('pScore').textContent=p1.score;document.getElementById('aScore').textContent=p2.score;}
c.addEventListener('mousemove',function(e){var rect=c.getBoundingClientRect();p1.y=(e.clientY-rect.top)*(H/rect.height)-paddleH/2;if(p1.y<0)p1.y=0;if(p1.y>H-paddleH)p1.y=H-paddleH;});
init();
</script></body></html>
