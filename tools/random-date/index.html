<main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 随机日期时间</div><h2>🎲 随机日期时间生成 Random Date</h2><p class="desc">在指定范围内随机生成日期和时间</p><p class="desc-en">Generate random dates & times within a range</p></div>

<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
<span>从 From</span><input type="date" id="dFrom"><span>到 To</span><input type="date" id="dTo"></div>

<label style="font-size:.85rem;display:flex;align-items:center;gap:4px;cursor:pointer;"><input type="checkbox" id="includeTime"> 包含时间 Include Time</label>
<label style="font-size:.85rem;">数量 Count</label><input type="number" id="count" value="10" min="1" max="200" style="width:70px;"></div>
<button class="btn btn-primary" style="margin-top:10px;width:100%;" onclick="generate()">🎲 生成 Generate</button></div></div>

<script src="../../js/common.js?v=4"></script>
<script>
document.getElementById('dFrom').valueAsDate=new Date(2020,0,1);
document.getElementById('dTo').valueAsDate=new Date();
function generate(){
  var from=document.getElementById('dFrom').valueAsDate;
  var to=document.getElementById('dTo').valueAsDate;
  if(!from||!to||from>to){showToast('请选择有效日期范围');return;}
  var includeTime=document.getElementById('includeTime').checked;
  var count=parseInt(document.getElementById('count').value)||10;
  var range=to-from,results=[];
  for(var i=0;i<count;i++){
    var d=new Date(from.getTime()+Math.random()*range);
    if(includeTime){
      d.setHours(Math.floor(Math.random()*24),Math.floor(Math.random()*60),Math.floor(Math.random()*60));
      results.push(d.toLocaleString('zh-CN'));
    } else {
      results.push(d.toLocaleDateString('zh-CN'));
    }
  }
  results.sort(function(a,b){return new Date(a)-new Date(b);});
  document.getElementById('output').innerHTML=results.map(function(r,i){return (i+1)+'. '+r;}).join('<br>');
}
</script></body></html>
