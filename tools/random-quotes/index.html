<script>
var currentType = '';
function pick(type) {
  currentType = type;
  var pool = quotes[type];
  var item = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('output').textContent = item;
  document.getElementById('nextBtn').style.display = '';

function nextPick() {
  if (!currentType) return;
  pick(currentType);
}
