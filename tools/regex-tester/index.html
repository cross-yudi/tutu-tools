<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正则表达式测试 Regex Tester - 兔兔工具站</title>
<meta name="description" content="在线正则表达式测试工具，实时匹配高亮显示。Online regex tester — test regex patterns with highlighting.">
<meta name="keywords" content="正则表达式,regex tester,正则测试,regex test,在线正则">
<link rel="stylesheet" href="../../css/style.css">
<style>.regex-highlight{background:#fef3c7;border-radius:2px;padding:0 1px;}.regex-match{border-bottom:2px solid #f59e0b;}</style></head>
<body>
<header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header>
<main class="main">
<div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 正则表达式测试</div><h2>🔍 正则表达式测试工具</h2><p class="desc">在线测试正则表达式，匹配结果高亮显示</p><p class="desc-en">Test your regex patterns with live highlighting</p></div>
<div class="tool-body">
<div class="tool-row"><div class="tool-panel"><label>正则表达式 <span class="label-en">Regex</span></label>
<div style="display:flex;gap:4px;align-items:center;"><span style="font-size:1.2rem;">/</span><input type="text" id="pattern" placeholder="输入正则..." style="flex:1;"><span style="font-size:1.2rem;">/</span><input type="text" id="flags" placeholder="g" style="width:50px;"></div>
<label style="margin-top:10px;">测试文本 <span class="label-en">Test String</span></label><textarea id="testStr" placeholder="输入测试文本..." style="min-height:120px;"></textarea>
<button class="btn btn-primary" style="margin-top:10px;" onclick="testRegex()">测试 Test</button></div></div>
<div class="tool-panel"><label>匹配结果 <span class="label-en">Matches</span></label><div class="result-area" id="highlight"></div>
<div class="info-bar"><span id="infoTip"></span><button class="btn btn-outline btn-sm copy-btn" onclick="copyText(document.getElementById('matches').textContent)">📋 复制匹配 Copy Matches</button></div></div>
<div class="tool-panel"><label>匹配列表 <span class="label-en">Match List</span></label><div class="result-area" id="matches" style="max-height:200px;overflow:auto;">-</div></div>
</div></main>
<footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer>
<script src="../../js/common.js"></script>
<script>
function testRegex(){
  var pattern=document.getElementById('pattern').value;
  var flags=document.getElementById('flags').value;
  var str=document.getElementById('testStr').value;
  if(!pattern){showToast('请输入正则表达式 Enter regex pattern');return;}
  try{
    var re=new RegExp(pattern,flags);
    var matches=str.match(re);
    if(!flags.includes('g')){
      var result=re.exec(str);
      if(result){
        // 高亮第一个匹配
        var before=str.slice(0,result.index);
        var match=str.slice(result.index,result.index+result[0].length);
        var after=str.slice(result.index+result[0].length);
        document.getElementById('highlight').innerHTML=escapeHtml(before)+'<span class="regex-highlight">'+escapeHtml(match)+'</span>'+escapeHtml(after);
        document.getElementById('matches').textContent='匹配 Match：'+match+'\n位置 Index：'+result.index+'\n分组 Groups：'+JSON.stringify(result.slice(1));
        document.getElementById('infoTip').textContent='1 个匹配 1 match';
      } else {
        document.getElementById('highlight').textContent=str;
        document.getElementById('matches').textContent='无匹配 No match';
        document.getElementById('infoTip').textContent='0 个匹配';
      }
    } else {
      if(matches){
        var highlighted=str;
        matches.forEach(function(m){
          highlighted=highlighted.replace(m,'<span class="regex-highlight">'+m+'</span>');
        });
        var clean=str.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        document.getElementById('highlight').innerHTML=clean.replace(new RegExp('('+pattern.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g'+flags.replace('g','')),'<span class="regex-highlight">$1</span>');
        document.getElementById('matches').textContent=matches.map(function(m,i){return (i+1)+'. '+m;}).join('\n');
        document.getElementById('infoTip').textContent=matches.length+' 个匹配 matches';
      } else {
        document.getElementById('highlight').textContent=str;
        document.getElementById('matches').textContent='无匹配 No match';
        document.getElementById('infoTip').textContent='0 个匹配';
      }
    }
  }catch(e){
    document.getElementById('highlight').textContent=str;
    document.getElementById('matches').textContent='❌ 正则错误 Regex error: '+e.message;
    document.getElementById('infoTip').textContent='❌ 正则无效 Invalid';
  }
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
