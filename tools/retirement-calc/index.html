<script>
document.getElementById('birth').valueAsDate=new Date(1990,0,1);
function calc(){
  var birth=document.getElementById('birth').valueAsDate;
  if(!birth){showToast('请选择出生日期');return;}
  var gender=document.getElementById('gender').value;
  var job=document.getElementById('job').value;
  // 2025年起延迟退休政策：男60→63，女干部55→58，女职工50→55（逐步延迟）
  var birthYear=birth.getFullYear();
  if(gender==='male'){
    if(birthYear<1965){var retireAge=60;}
    else if(birthYear<=1976){var retireAge=60+(birthYear-1964)*0.25;} // 逐步延迟
    else{var retireAge=63;}
  } else {
    if(job==='official'){
      if(birthYear<1970){var retireAge=55;}
      else if(birthYear<=1981){var retireAge=55+(birthYear-1969)*0.25;}
      else{var retireAge=58;}
    } else {
      if(birthYear<1975){var retireAge=50;}
      else if(birthYear<=1986){var retireAge=50+(birthYear-1974)*0.25;}
      else{var retireAge=55;}
    }
  }
  retireAge=Math.round(retireAge*1)/1;
  var retireYear=birth.getFullYear()+Math.floor(retireAge);
  var retireMonth=birth.getMonth();
  var extraMonths=Math.round((retireAge%1)*12);
  retireMonth+=extraMonths;
  if(retireMonth>11){retireYear++;retireMonth-=12;}
  var retireDate=new Date(retireYear,retireMonth,birth.getDate());

  document.getElementById('rAge').textContent=retireAge+' 岁';
  document.getElementById('rDate').textContent=retireDate.toLocaleDateString('zh-CN');
  document.getElementById('rInfo').textContent='* 按2025年延迟退休政策估算 Estimated per 2025 policy';
}
