<script src="../../js/common.js?v=2"></script><script>

function play(p){
  var c=keys[Math.floor(Math.random()*3)];
  document.getElementById('playerIcon').textContent=icons[p];

}
function renderHistory(){
  var hp=document.getElementById('histP'),hc=document.getElementById('histC');

  }
}
