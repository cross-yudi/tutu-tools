<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>猜拳连胜挑战 RPS - 兔兔工具站</title><meta name="description" content="石头剪刀布连胜挑战。Rock Paper Scissors streak challenge."><meta name="keywords" content="猜拳,石头剪刀布,RPS"><link rel="stylesheet" href="../../css/style.css"><style>.arena{display:flex;align-items:center;justify-content:center;gap:40px;flex-wrap:wrap;margin:16px 0;}.player-side,.comp-side{text-align:center;min-width:120px;}.big-icon{font-size:5rem;line-height:1;transition:all .3s;}.vs{font-size:2rem;font-weight:800;color:var(--text-secondary);}.choice-btn{font-size:3rem;padding:14px 20px;border:2px solid var(--border);border-radius:16px;background:#fff;cursor:pointer;transition:all .2s;}.choice-btn:hover{transform:scale(1.15);border-color:var(--primary);box-shadow:var(--shadow-md);}.streak-num{font-size:3rem;font-weight:800;color:var(--primary-dark);}.history-col{display:flex;flex-direction:column;gap:2px;align-items:center;width:50px;min-height:60px;max-height:240px;overflow-y:auto;border:1.5px solid var(--border);border-radius:8px;background:#fafbfc;padding:4px;}.hist-item{display:block;font-size:2rem;width:40px;height:36px;text-align:center;line-height:36px;border-radius:4px;}.hist-win{background:#dcfce7;}.hist-lose{background:#fee2e2;}.hist-draw{background:#f1f5f9;}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 猜拳挑战</div><h2>✊ 猜拳连胜挑战</h2><p class="desc">石头剪刀布，看你能连胜多少局</p><p class="desc-en">RPS streak — how many can you win in a row?</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;">
<div class="arena">
  <div style="text-align:center;"><div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:4px;">出拳记录</div><div class="history-col" id="histP"></div></div>
  <div class="player-side"><p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:6px;">你 You</p><div class="big-icon" id="playerIcon">🤔</div></div>
  <div class="vs">VS</div>
  <div class="comp-side"><p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:6px;">电脑 CPU</p><div class="big-icon" id="compIcon">🤔</div></div>
  <div style="text-align:center;"><div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:4px;">出拳记录</div><div class="history-col" id="histC"></div></div>
</div>
<div style="font-size:1.1rem;margin:8px 0;" id="resultText">选择出拳 Pick your move</div>
<div>连胜 Streak：<span class="streak-num" id="streak">0</span> <span style="font-size:.8rem;color:var(--text-en);">| 最佳 Best：<strong id="best">0</strong></span></div>
<div style="margin:14px 0;display:flex;gap:12px;justify-content:center;"><button class="choice-btn" onclick="play('rock')" title="石头">✊</button><button class="choice-btn" onclick="play('scissors')" title="剪刀">✌️</button><button class="choice-btn" onclick="play('paper')" title="布">🖐️</button></div>
<button class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="resetGame()">重置 Reset</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var streak=0,best=parseInt(localStorage.getItem('rps_best')||'0'),history=[];
document.getElementById('best').textContent=best;
var icons={rock:'✊',scissors:'✌️',paper:'🖐️'},keys=['rock','scissors','paper'];

function play(player){
  var comp=keys[Math.floor(Math.random()*3)];
  document.getElementById('playerIcon').textContent=icons[player];
  document.getElementById('compIcon').textContent=icons[comp];

  var result='',cls='';
  if(player===comp){result='平局 Draw';cls='hist-draw';}
  else if((player==='rock'&&comp==='scissors')||(player==='scissors'&&comp==='paper')||(player==='paper'&&comp==='rock')){
    result='你赢了！You Win!';cls='hist-win';streak++;
    if(streak>best){best=streak;localStorage.setItem('rps_best',best);document.getElementById('best').textContent=best;}
  }else{result='你输了 You Lose';cls='hist-lose';streak=0;}

  document.getElementById('streak').textContent=streak;
  document.getElementById('resultText').textContent=result+' ('+icons[player]+' vs '+icons[comp]+')';
  history.unshift({player:icons[player],comp:icons[comp],cls:cls});
  renderHistory();
}

function renderHistory(){
  var hp=document.getElementById('histP'),hc=document.getElementById('histC');
  if(history.length===0){hp.innerHTML='<span style="color:var(--border);font-size:1.3rem;">-</span>';hc.innerHTML='<span style="color:var(--border);font-size:1.3rem;">-</span>';return;}
  var items=history.slice(0,10);
  hp.innerHTML=items.map(function(item){return '<span class="hist-item '+item.cls+'">'+item.player+'</span>';}).join('');
  hc.innerHTML=items.map(function(item){return '<span class="hist-item '+item.cls+'">'+item.comp+'</span>';}).join('');
}
renderHistory();

function resetGame(){streak=0;history=[];document.getElementById('streak').textContent='0';document.getElementById('playerIcon').textContent='🤔';document.getElementById('compIcon').textContent='🤔';document.getElementById('resultText').textContent='选择出拳 Pick your move';renderHistory();}
</script></body></html>
