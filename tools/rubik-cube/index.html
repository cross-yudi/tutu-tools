// Rubik's cube faces (6 faces, 3x3 grid each)
// Colors: W=White, Y=Yellow, R=Red, O=Orange, B=Blue, G=Green
var faces={F:['G','G','G','G','G','G','G','G','G'],B:['B','B','B','B','B','B','B','B','B'],R:['R','R','R','R','R','R','R','R','R'],L:['O','O','O','O','O','O','O','O','O'],U:['W','W','W','W','W','W','W','W','W'],D:['Y','Y','Y','Y','Y','Y','Y','Y','Y']};

var colorMap={W:'#ffffff',Y:'#facc15',R:'#ef4444',O:'#f97316',B:'#3b82f6',G:'#10b981'};
function renderFaces(){for(var f in faces){var el=document.getElementById('face'+f);el.innerHTML='';faces[f].forEach(function(c){var d=document.createElement('div');d.style.background=colorMap[c]||'#ccc';el.appendChild(d);});}}
renderFaces();

// Rotation mappings for each face
function rotateFace(face){
  var f=faces;
  if(face==='U'){
    rotateGrid(f.U,true);
    var r1=f.F.slice(0,3),r2=f.R.slice(0,3),r3=f.B.slice(0,3),r4=f.L.slice(0,3);
    replaceRow(f.F,0,[].concat(r4));replaceRow(f.R,0,[].concat(r1));replaceRow(f.B,0,[].concat(r2));replaceRow(f.L,0,[].concat(r3));
  }else if(face==='D'){
    rotateGrid(f.D,false);
    var r1=f.F.slice(6,9),r2=f.L.slice(6,9),r3=f.B.slice(6,9),r4=f.R.slice(6,9);
    replaceRow(f.F,6,[].concat(r4));replaceRow(f.L,6,[].concat(r1));replaceRow(f.B,6,[].concat(r2));replaceRow(f.R,6,[].concat(r3));
  }else if(face==='R'){
    rotateGrid(f.R,true);
    var c1=getCol(f.U,2),c2=getCol(f.B,0).reverse(),c3=getCol(f.D,2).reverse(),c4=getCol(f.F,2);
    setCol(f.U,2,c4);setCol(f.B,0,c1.reverse());setCol(f.D,2,c2.reverse());setCol(f.F,2,c3);
  }else if(face==='L'){
    rotateGrid(f.L,true);
    var c1=getCol(f.U,0),c2=getCol(f.F,0),c3=getCol(f.D,0).reverse(),c4=getCol(f.B,2).reverse();
    setCol(f.U,0,c4);setCol(f.F,0,c1);setCol(f.D,0,c2.reverse());setCol(f.B,2,c3.reverse());
  }else if(face==='F'){
    rotateGrid(f.F,true);
    var c1=f.U.slice(6,9),c2=getCol(f.R,0),c3=f.D.slice(0,3).reverse(),c4=getCol(f.L,2);
    replaceRow(f.U,6,c4);setCol(f.R,0,c1);replaceRow(f.D,0,c3.reverse());setCol(f.L,2,c2);
  }else if(face==='B'){
    rotateGrid(f.B,true);
    var c1=f.U.slice(0,3).reverse(),c2=getCol(f.L,0),c3=f.D.slice(6,9),c4=getCol(f.R,2);
    replaceRow(f.U,0,c3.reverse());setCol(f.L,0,c1.reverse());replaceRow(f.D,6,c2);setCol(f.R,2,c4);
  }
  renderFaces();
}

function rotateGrid(grid,cw){
  var g=[].concat(grid);
  if(cw){grid[0]=g[6];grid[1]=g[3];grid[2]=g[0];grid[3]=g[7];grid[4]=g[4];grid[5]=g[1];grid[6]=g[8];grid[7]=g[5];grid[8]=g[2];}
  else{grid[0]=g[2];grid[1]=g[5];grid[2]=g[8];grid[3]=g[1];grid[5]=g[7];grid[6]=g[0];grid[7]=g[3];grid[8]=g[6];}
}

function getCol(grid,col){return [grid[col],grid[col+3],grid[col+6]];}
function setCol(grid,col,vals){grid[col]=vals[0];grid[col+3]=vals[1];grid[col+6]=vals[2];}
function replaceRow(grid,start,vals){for(var i=0;i<vals.length;i++)grid[start+i]=vals[i];}

function scramble(){var moves=['U','D','L','R','F','B'];for(var i=0;i<20;i++){rotateFace(moves[Math.floor(Math.random()*6)]);}}
function resetCube(){for(var f in faces){faces[f]=faces[f].map(function(_,i){var keys={F:'G',B:'B',R:'R',L:'O',U:'W',D:'Y'};return keys[f];});}renderFaces();}

// Mouse drag to rotate view
var cube=document.getElementById('cube'),rotX=-25,rotY=45,dragging=false,lastX,lastY;
cube.addEventListener('mousedown',function(e){dragging=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault();});
cube.addEventListener('mousemove',function(e){if(!dragging)return;rotY+=(e.clientX-lastX)*0.5;rotX-=(e.clientY-lastY)*0.5;cube.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';lastX=e.clientX;lastY=e.clientY;});
document.addEventListener('mouseup',function(){dragging=false;});
cube.addEventListener('touchstart',function(e){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;});
cube.addEventListener('touchmove',function(e){if(!dragging)return;rotY+=(e.touches[0].clientX-lastX)*0.5;rotX-=(e.touches[0].clientY-lastY)*0.5;cube.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;});
document.addEventListener('touchend',function(){dragging=false;});
</script></body></html>
