<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>贪吃蛇 Snake - 兔兔工具站</title><meta name="description" content="经典贪吃蛇小游戏，方向键控制。Classic snake game — use arrow keys to play."><meta name="keywords" content="贪吃蛇,snake game,小游戏"><link rel="stylesheet" href="../../css/style.css"><style>canvas{border:2px solid var(--border);border-radius:8px;display:block;margin:0 auto;background:#1a1a2e;}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 贪吃蛇</div><h2>🐍 贪吃蛇</h2><p class="desc">方向键控制蛇吃食物，越长越难！</p><p class="desc-en">Classic Snake — eat food, grow longer!</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;"><label>分数 <span class="label-en">Score</span></label><div style="font-size:2rem;font-weight:800;color:#059669;" id="score">0</div><canvas id="c" width="360" height="360"></canvas><p style="font-size:.75rem;color:var(--text-en);margin-top:8px;">⬆⬇⬅➡ 方向键 Arrow keys</p><button class="btn btn-primary" style="margin-top:8px;" onclick="startGame()">🔄 重新开始 Restart</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var c=document.getElementById('c'),ctx=c.getContext('2d'),gs=20,tc=18;
var snake,food,dir,nextDir,score,gameOver,interval;
function startGame(){snake=[{x:9,y:9},{x:8,y:9},{x:7,y:9}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;gameOver=false;spawnFood();document.getElementById('score').textContent='0';if(interval)clearInterval(interval);interval=setInterval(tick,120);}
function spawnFood(){do{var fx=Math.floor(Math.random()*tc),fy=Math.floor(Math.random()*tc);var onSnake=snake.some(function(s){return s.x===fx&&s.y===fy;});}while(onSnake);food={x:fx,y:fy};}
function tick(){if(gameOver)return;dir=nextDir;var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(head.x<0||head.x>=tc||head.y<0||head.y>=tc||snake.some(function(s){return s.x===head.x&&s.y===head.y;})){gameOver=true;clearInterval(interval);draw();return;}
snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('score').textContent=score;spawnFood();}else{snake.pop();}draw();}
function draw(){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,360,360);ctx.fillStyle='#10b981';snake.forEach(function(s){ctx.fillRect(s.x*gs+1,s.y*gs+1,gs-2,gs-2);});ctx.fillStyle='#ef4444';ctx.fillRect(food.x*gs+2,food.y*gs+2,gs-4,gs-4);if(gameOver){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,360,360);ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结束 Game Over',180,170);ctx.font='14px sans-serif';ctx.fillText('点击重新开始 Click to restart',180,200);}}
document.addEventListener('keydown',function(e){if(e.key==='ArrowUp'&&dir.y===0)nextDir={x:0,y:-1};else if(e.key==='ArrowDown'&&dir.y===0)nextDir={x:0,y:1};else if(e.key==='ArrowLeft'&&dir.x===0)nextDir={x:-1,y:0};else if(e.key==='ArrowRight'&&dir.x===0)nextDir={x:1,y:0};});
c.addEventListener('click',function(){if(gameOver)startGame();});
startGame();
</script></body></html>
