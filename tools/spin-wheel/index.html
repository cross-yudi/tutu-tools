<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>随机转盘 Spin Wheel - 兔兔在线工具站</title><meta name="description" content="在线随机转盘，自定义8个选项，点击转出结果。Online spin wheel with 8 options."><meta name="keywords" content="随机转盘,spin wheel,幸运转盘"><link rel="stylesheet" href="../../css/style.css"></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔在线工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 随机转盘</div><h2>🎡 随机转盘</h2><p class="desc">设置8个选项，点击中心按钮随机转出结果</p><p class="desc-en">Set 8 options and spin the wheel!</p></div><div class="tool-body"><div class="tool-row"><div class="tool-panel" style="text-align:center;"><label>转盘 <span class="label-en">Wheel</span></label><canvas id="wheel" width="300" height="300" style="cursor:pointer;"></canvas><div style="font-size:1.2rem;margin-top:8px;" id="resultText">点击中心 SPIN 开始 Click to spin</div><button class="btn btn-primary" style="margin-top:8px;" onclick="spin()">🎯 开始旋转 Spin</button></div><div class="tool-panel"><label>设置选项 <span class="label-en">Options</span></label><div id="inputs"></div><div class="btn-row" style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="resetOpts()">重置默认 Reset</button></div><label style="margin-top:10px;">旋转记录 <span class="label-en">History</span></label><div class="result-area" id="history" style="font-family:inherit;max-height:180px;overflow-y:auto;"></div><button class="btn btn-outline btn-sm" style="margin-top:4px;" onclick="clearHist()">清空记录 Clear</button></div></div></div></main><footer class="footer">© 2026 兔兔在线工具站 Tutu Tools — 联系 Contact: gubaby@proton.me</footer><script src="../../js/common.js"></script><script>
var ctx=document.getElementById('wheel').getContext('2d');
var colors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316'];
var defs=['选项1 Opt1','选项2 Opt2','选项3 Opt3','选项4 Opt4','选项5 Opt5','选项6 Opt6','选项7 Opt7','选项8 Opt8'];
var options=JSON.parse(localStorage.getItem('wheel_opts')||JSON.stringify(defs));
var hist=JSON.parse(localStorage.getItem('wheel_hist')||'[]');
var angle=0,spinning=false;

function buildInputs(){
  var d=document.getElementById('inputs');d.innerHTML='';
  for(var i=0;i<8;i++){
    var row=document.createElement('div');
    row.style.cssText='display:flex;gap:4px;margin:3px 0;align-items:center;';
    row.innerHTML='<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:'+colors[i]+';flex-shrink:0;"></span><input type="text" value="'+options[i].replace(/"/g,'&quot;')+'" onchange="updateOpt('+i+',this.value)" style="flex:1;padding:4px 8px;font-size:.85rem;">';
    d.appendChild(row);
  }
}
function updateOpt(i,v){options[i]=v;localStorage.setItem('wheel_opts',JSON.stringify(options));draw();}
function resetOpts(){options=[].concat(defs);localStorage.setItem('wheel_opts',JSON.stringify(options));buildInputs();draw();}
function clearHist(){hist=[];localStorage.setItem('wheel_hist','[]');showHist();}

function draw(){
  var sz=300,cx=sz/2,cy=sz/2,r=130;
  ctx.clearRect(0,0,sz,sz);
  // Draw 8 segments
  for(var i=0;i<8;i++){
    var a1=angle+i*Math.PI/4,a2=angle+(i+1)*Math.PI/4;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a1,a2);ctx.closePath();
    ctx.fillStyle=colors[i];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    // Text rotated in middle of segment
    ctx.save();ctx.translate(cx,cy);ctx.rotate((a1+a2)/2);
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    var t=options[i];if(t.length>8)t=t.substring(0,7)+'..';
    ctx.fillText(t,95,4);ctx.restore();
  }
  // Center circle + pointer triangle
  ctx.beginPath();ctx.arc(cx,cy,32,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=2;ctx.stroke();
  // Pointer triangle at top of center circle
  ctx.beginPath();ctx.moveTo(cx,cy-38);ctx.lineTo(cx-10,cy-24);ctx.lineTo(cx+10,cy-24);ctx.closePath();ctx.fillStyle='#ef4444';ctx.fill();
  // SPIN text
  ctx.fillStyle='#333';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(spinning?'...':'SPIN',cx,cy+5);
}
draw();

function spin(){
  if(spinning)return;spinning=true;
  var extra=3+Math.floor(Math.random()*4);
  var target=angle+extra*Math.PI*2+Math.random()*Math.PI*2;
  var start=a=angle,startTime=Date.now(),dur=2800;
  function anim(){
    var p=Math.min((Date.now()-startTime)/dur,1);
    var e=1-Math.pow(1-p,3);
    angle=start+(target-start)*e;draw();
    if(p<1){requestAnimationFrame(anim);}else{
      spinning=false;
      var norm=((angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
      var idx=Math.floor(((2*Math.PI-norm+Math.PI/8)%(Math.PI*2))/(Math.PI/4))%8;
      var result=options[idx];
      document.getElementById('resultText').textContent='🎉 结果 Result：'+result;
      hist.unshift({opt:result,time:new Date().toLocaleString('zh-CN')});
      if(hist.length>50)hist.length=50;
      localStorage.setItem('wheel_hist',JSON.stringify(hist));
      showHist();draw();
    }
  }
  anim();
}

function showHist(){
  var h=document.getElementById('history');
  if(!h)return;
  if(!hist.length){h.innerHTML='<div style="color:var(--text-en);font-size:.82rem;">旋转后显示记录 History after spin</div>';return;}
  h.innerHTML='<div style="font-size:.78rem;color:var(--primary-dark);margin-bottom:4px;">共 '+hist.length+' 次 Total</div>'+hist.map(function(item,i){return '<div style="padding:3px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;">'+(i+1)+'. <strong>'+item.opt+'</strong> <span style="color:var(--text-en);font-size:.7rem;">'+item.time+'</span></div>';}).join('');
}

buildInputs();showHist();
</script></body></html>
