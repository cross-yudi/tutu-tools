<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>随机转盘 Spin Wheel - 兔兔在线工具站</title><meta name="description" content="在线随机转盘，自定义8个选项，点击转出结果。Online spin wheel with 8 customizable options."><meta name="keywords" content="随机转盘,spin wheel,幸运转盘,抽奖转盘,decision wheel"><link rel="stylesheet" href="../../css/style.css"></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔在线工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 随机转盘</div><h2>🎡 随机转盘</h2><p class="desc">设置8个选项，点击转盘随机转出结果</p><p class="desc-en">Customize 8 options and spin the wheel!</p></div><div class="tool-body"><div class="tool-row"><div class="tool-panel" style="text-align:center;"><label>转盘 <span class="label-en">Wheel</span></label><canvas id="wheel" width="300" height="300" style="cursor:pointer;"></canvas><div style="font-size:1.2rem;margin-top:8px;" id="resultText">点击转盘中心开始 Click to spin</div><button class="btn btn-primary" style="margin-top:8px;" onclick="spin()">🎯 开始旋转 Spin</button></div><div class="tool-panel"><label>设置选项 <span class="label-en">Options</span></label><div id="inputs"></div><div class="btn-row" style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="resetOpts()">重置默认 Reset</button></div><label style="margin-top:10px;">旋转记录 <span class="label-en">History</span></label><div class="result-area" id="history" style="font-family:inherit;max-height:180px;overflow-y:auto;"></div><button class="btn btn-outline btn-sm" style="margin-top:4px;" onclick="clearHistory()">清空记录 Clear</button></div></div></div></main><footer class="footer">© 2026 兔兔在线工具站 Tutu Tools — 联系 Contact: gubaby@proton.me</footer><script src="../../js/common.js"></script><script>
var colors=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316'];
var defaults=['选项1 Opt1','选项2 Opt2','选项3 Opt3','选项4 Opt4','选项5 Opt5','选项6 Opt6','选项7 Opt7','选项8 Opt8'];
var options=JSON.parse(localStorage.getItem('wheel_opts')||JSON.stringify(defaults));
var history=JSON.parse(localStorage.getItem('wheel_hist')||'[]');
var angle=0,spinning=false,ctx,resultIdx=-1;

// Build input fields
var inputsDiv=document.getElementById('inputs');
function buildInputs(){inputsDiv.innerHTML='';for(var i=0;i<8;i++){var row=document.createElement('div');row.style.cssText='display:flex;gap:4px;margin:3px 0;align-items:center;';
row.innerHTML='<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:'+colors[i]+';flex-shrink:0;"></span><input type="text" value="'+options[i]+'" oninput="updateOpt('+i+',this.value)" style="flex:1;padding:4px 8px;font-size:.85rem;">';
inputsDiv.appendChild(row);}}buildInputs();

function updateOpt(i,val){options[i]=val;localStorage.setItem('wheel_opts',JSON.stringify(options));drawWheel();}

function resetOpts(){options=[].concat(defaults);localStorage.setItem('wheel_opts',JSON.stringify(options));buildInputs();drawWheel();}

function clearHistory(){history=[];localStorage.setItem('wheel_hist','[]');document.getElementById('history').innerHTML='';}

ctx=document.getElementById('wheel').getContext('2d');
function drawWheel(){
  var size=300,cx=size/2,cy=size/2,r=135;
  ctx.clearRect(0,0,size,size);
  for(var i=0;i<8;i++){
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,(angle+i*Math.PI/4),(angle+(i+1)*Math.PI/4));ctx.closePath();
    ctx.fillStyle=colors[i];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(angle+i*Math.PI/4+Math.PI/8);
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    var txt=options[i].length>8?options[i].substring(0,8)+'..':options[i];
    ctx.fillText(txt,100,4);ctx.restore();
  }
  // center button
  ctx.beginPath();ctx.arc(cx,cy,28,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#333';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(spinning?'...':'SPIN',cx,cy+4);
  // pointer
  ctx.beginPath();ctx.moveTo(size-5,cy-10);ctx.lineTo(size-15,cy);ctx.lineTo(size-5,cy+10);ctx.closePath();ctx.fillStyle='#333';ctx.fill();
}
drawWheel();

function spin(){
  if(spinning)return;spinning=true;
  var spins=5+Math.floor(Math.random()*5); // 5-9 full rotations
  var targetAngle=angle+spins*Math.PI*2+Math.random()*Math.PI*2;
  var startAngle=angle,startTime=Date.now(),duration=3000;
  function animate(){
    var elapsed=Date.now()-startTime,progress=Math.min(elapsed/duration,1);
    var ease=1-Math.pow(1-progress,3); // ease-out cubic
    angle=startAngle+(targetAngle-startAngle)*ease;
    drawWheel();
    if(progress<1){requestAnimationFrame(animate);}else{
      spinning=false;
      var norm=((angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
      resultIdx=Math.floor(((2*Math.PI-norm+Math.PI/8)%(Math.PI*2))/(Math.PI/4))%8;
      var result=options[resultIdx];
      document.getElementById('resultText').textContent='🎉 结果：'+result+' Result: '+result;
      history.unshift({opt:result,time:new Date().toLocaleString('zh-CN')});
      if(history.length>50)history.length=50;
      localStorage.setItem('wheel_hist',JSON.stringify(history));
      renderHistory();
      drawWheel();
    }
  }
  animate();
}

function renderHistory(){
  var h=document.getElementById('history');
  if(!h)return;
  if(!history.length){h.innerHTML='<div style="color:var(--text-en);font-size:.8rem;">旋转后显示记录 History after spin</div>';return;}
  h.innerHTML='<div style="color:var(--primary-dark);font-weight:600;margin-bottom:4px;">共 '+history.length+' 次 Total</div>'+history.map(function(item,i){return '<div style="padding:3px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;">'+(i+1)+'. <strong>'+item.opt+'</strong> <span style="color:var(--text-en);font-size:.7rem;">'+item.time+'</span></div>';}).join('');
}
setTimeout(renderHistory,100);
</script></body></html>
