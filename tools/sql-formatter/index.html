<body>
<header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔在线工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header>
<main class="main">
<div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / SQL 格式化</div><h2>🗄️ SQL 格式化压缩</h2><p class="desc">SQL 代码美化和压缩</p><p class="desc-en">Format & minify your SQL queries</p></div>
<div class="tool-body">
<div class="tool-panel"><label>输入 SQL <span class="label-en">Input</span></label><textarea id="input" placeholder="SELECT * FROM users WHERE id=1 ORDER BY name" style="min-height:200px;"></textarea>
<div class="btn-row" style="margin-top:8px;"><button class="btn btn-primary" onclick="beautify()">🔧 格式化 Format</button><button class="btn btn-primary" onclick="minify()">📦 压缩 Minify</button><button class="btn btn-outline" onclick="clearInput('input')">清空 Clear</button></div></div>
<div class="tool-panel"><label>结果 <span class="label-en">Result</span></label><div class="result-area" id="output" style="font-family:monospace;"></div>
<div class="info-bar"><span id="infoTip"></span><button class="btn btn-outline btn-sm copy-btn" onclick="copyText(document.getElementById('output').textContent)">📋 复制 Copy</button></div></div>

<script src="../../js/common.js"></script>
<script>
var keywords=['SELECT','FROM','WHERE','AND','OR','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','ON','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','INSERT INTO','VALUES','UPDATE','SET','DELETE','CREATE TABLE','ALTER TABLE','DROP TABLE','INDEX','VIEW','UNION','ALL','AS','DISTINCT','BETWEEN','LIKE','IN','IS NULL','IS NOT NULL','NOT','EXISTS','CASE','WHEN','THEN','ELSE','END','ASC','DESC','COUNT','SUM','AVG','MAX','MIN','WITH','RECURSIVE'];

function beautify(){
  var sql=document.getElementById('input').value;
  sql=sql.replace(/\s+/g,' ').trim();
  // 在关键字前换行
  var lineStarters=['SELECT','FROM','WHERE','AND','OR','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN','ON','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','INSERT INTO','VALUES','UPDATE','SET','DELETE','CREATE TABLE','ALTER TABLE','UNION','ALL','WITH'];
  lineStarters.forEach(function(kw){
    var re=new RegExp('\\b'+kw.replace(/\s/g,'\\s')+'\\b','gi');
    sql=sql.replace(re,'\n'+kw.toUpperCase());
  });
  // 清理多余空行
  sql=sql.replace(/\n+/g,'\n').trim();
  document.getElementById('output').textContent=sql;
  document.getElementById('infoTip').textContent='已格式化 Formatted | '+sql.length+' 字符 chars';
}
function minify(){
  var sql=document.getElementById('input').value;
  sql=sql.replace(/\s+/g,' ').trim();
  document.getElementById('output').textContent=sql;
  document.getElementById('infoTip').textContent='已压缩 Minified | '+sql.length+' 字符 chars';
}
</script>
