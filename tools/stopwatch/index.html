<div class="tool-body">

<script src="../../js/common.js?v=3"></script>
<script>
var running=false,startTime=0,elapsed=0,timer=null,laps=[],lastLap=0;
var display=document.getElementById('display'),btnStart=document.getElementById('btnStart'),btnLap=document.getElementById('btnLap');

function format(ms){var h=Math.floor(ms/3600000),m=Math.floor(ms/60000)%60,s=Math.floor(ms/1000)%60,c=Math.floor(ms/10)%100;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');}

function tick(){
  var now=Date.now();
  display.textContent=format(elapsed+(now-startTime));
}

function start(){
  if(running){
    clearInterval(timer);elapsed+=Date.now()-startTime;running=false;btnStart.textContent='▶ 继续 Resume';btnLap.disabled=true;
  } else {
    startTime=Date.now();running=true;btnStart.textContent='⏸ 暂停 Pause';btnLap.disabled=false;
    timer=setInterval(tick,30);
  }
}

function lap(){
  if(!running)return;
  var now=Date.now(),total=elapsed+(now-startTime),lapTime=total-lastLap;
  lastLap=total;laps.push({num:laps.length+1,total:total,lap:lapTime});
  var html='';
  laps.forEach(function(l){html+='<div>#'+l.num+' '+format(l.total)+' (分段 Split: +'+format(l.lap)+')</div>';});
  document.getElementById('laps').innerHTML=html;
}

function reset(){clearInterval(timer);running=false;elapsed=0;lastLap=0;laps=[];display.textContent='00:00:00.00';btnStart.textContent='▶ 开始 Start';btnLap.disabled=true;document.getElementById('laps').textContent='-';}
</script></body></html>
