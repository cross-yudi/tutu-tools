<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>数独 Sudoku - 兔兔工具站</title><meta name="description" content="经典数独游戏。Classic Sudoku puzzle."><meta name="keywords" content="数独,sudoku,puzzle"><link rel="stylesheet" href="../../css/style.css"><style>.sg{display:grid;grid-template-columns:repeat(9,36px);gap:0;margin:0 auto;width:fit-content;border:3px solid #333;}.sc{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;cursor:pointer;border:1px solid #ccc;background:#fff;user-select:none;box-sizing:border-box;}.sc.given{background:#e8e8e8;font-weight:700;}.sc.sel{background:#fef3c7;}.sc.err{background:#fee;color:#ef4444;}.sn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;margin:2px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-weight:600;background:#fff;font-size:.9rem;}.sn:hover{background:var(--primary-light);border-color:var(--primary);}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 数独</div><h2>🧩 数独</h2><p class="desc">经典数独游戏，点击格子填入数字</p><p class="desc-en">Sudoku — click a cell and pick a number</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;"><div class="sg" id="sg"></div><div style="margin-top:10px;"><span class="sn" onclick="fn(0)">✕</span><span class="sn" style="border:none;width:8px;"></span><span class="sn" onclick="fn(1)">1</span><span class="sn" onclick="fn(2)">2</span><span class="sn" onclick="fn(3)">3</span><span class="sn" onclick="fn(4)">4</span><span class="sn" onclick="fn(5)">5</span><span class="sn" onclick="fn(6)">6</span><span class="sn" onclick="fn(7)">7</span><span class="sn" onclick="fn(8)">8</span><span class="sn" onclick="fn(9)">9</span></div><button class="btn btn-primary" style="margin-top:10px;" onclick="ng()">🔄 新游戏 New Game</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var P=[],S=[],sel=null;
var puzzles=[['530070000','600195000','098000060','800060003','400803001','700020006','060000280','000419005','000080079'],
['200080300','060070084','030500209','000105408','000000000','402706000','301007040','720040060','004010003'],
['000006000','059000008','200008000','045000000','003000000','000003006','000700049','001050000','080034010']];

function ng(){var p=puzzles[Math.floor(Math.random()*puzzles.length)];P=[];S=[];for(var r=0;r<9;r++){P[r]=[];S[r]=[];for(var c=0;c<9;c++){var v=parseInt(p[r][c])||0;P[r][c]=v;S[r][c]=v;}}sel=null;rnd();}
function rnd(){var g=document.getElementById('sg');g.innerHTML='';for(var r=0;r<9;r++)for(var c=0;c<9;c++){var d=document.createElement('div');d.className='sc';if(P[r][c]!==0)d.classList.add('given');if(S[r][c]!==0)d.textContent=S[r][c];if(sel&&sel.r===r&&sel.c===c)d.classList.add('sel');if(S[r][c]!==0&&P[r][c]===0&&!ok(r,c,S[r][c]))d.classList.add('err');if(c%3===2&&c<8)d.style.borderRight='2px solid #333';if(c%3===0&&c>0)d.style.borderLeft='2px solid #333';if(r%3===2&&r<8)d.style.borderBottom='2px solid #333';if(r%3===0&&r>0)d.style.borderTop='2px solid #333';d.onclick=(function(r,c){return function(){if(P[r][c]!==0)return;sel={r:r,c:c};rnd();};})(r,c);g.appendChild(d);}}
function fn(n){if(!sel)return;var r=sel.r,c=sel.c;if(P[r][c]!==0)return;S[r][c]=n;rnd();if(win())showToast('🎉 恭喜！You solved it!');}
function ok(r,c,v){if(v===0)return true;for(var i=0;i<9;i++){if(i!==c&&S[r][i]===v)return false;if(i!==r&&S[i][c]===v)return false;}var br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;for(var i=br;i<br+3;i++)for(var j=bc;j<bc+3;j++)if(i!==r||j!==c)if(S[i][j]===v)return false;return true;}
function win(){for(var r=0;r<9;r++)for(var c=0;c<9;c++){if(S[r][c]===0||!ok(r,c,S[r][c]))return false;}return true;}
ng();
</script></body></html>
