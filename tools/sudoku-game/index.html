<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>数独 Sudoku - 兔兔工具站</title><meta name="description" content="经典数独游戏，点击填入数字。Classic Sudoku puzzle — click to fill numbers."><meta name="keywords" content="数独,sudoku,数字游戏,puzzle"><link rel="stylesheet" href="../../css/style.css"><style>.sd-grid{display:grid;grid-template-columns:repeat(9,36px);gap:0;margin:0 auto;width:fit-content;border:2px solid #333;}.sd-cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;cursor:pointer;border:1px solid #ccc;background:#fff;user-select:none;}.sd-cell.given{background:#f0f0f0;color:#333;cursor:default;}.sd-cell.selected{background:#fef3c7;border-color:var(--primary);}.sd-cell.error{color:#ef4444;}.sd-cell:nth-child(3n){border-right:2px solid #333;}.sd-cell:nth-child(9n+1){border-left:2px solid #333;}.sd-grid .row:nth-child(3n) .sd-cell{border-bottom:2px solid #333;}.sd-grid .row:first-child .sd-cell{border-top:2px solid #333;}.sd-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;margin:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-weight:600;background:#fff;}.sd-num:hover{background:var(--primary-light);border-color:var(--primary);}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 数独</div><h2>🧩 数独</h2><p class="desc">经典数独游戏，点击格子填入数字1-9</p><p class="desc-en">Sudoku — click a cell and pick a number</p></div><div class="tool-body"><div class="tool-panel" style="text-align:center;"><div id="sdGrid"></div><div style="margin-top:10px;" id="numPad"><button class="sd-num" onclick="fillNum(0)">✕</button><span class="sd-num" style="width:12px;"></span><button class="sd-num" onclick="fillNum(1)">1</button><button class="sd-num" onclick="fillNum(2)">2</button><button class="sd-num" onclick="fillNum(3)">3</button><button class="sd-num" onclick="fillNum(4)">4</button><button class="sd-num" onclick="fillNum(5)">5</button><button class="sd-num" onclick="fillNum(6)">6</button><button class="sd-num" onclick="fillNum(7)">7</button><button class="sd-num" onclick="fillNum(8)">8</button><button class="sd-num" onclick="fillNum(9)">9</button></div><button class="btn btn-primary" style="margin-top:10px;" onclick="newGame()">🔄 新游戏 New Game</button></div></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var puzzle=[],solution=[],player=[],selectedCell=null;
var easyPuzzles=[['530070000','600195000','098000060','800060003','400803001','700020006','060000280','000419005','000080079']];

function newGame(){
  var p=easyPuzzles[0];puzzle=[];solution=[];player=[];
  for(var r=0;r<9;r++){puzzle[r]=[];player[r]=[];for(var c=0;c<9;c++){var v=parseInt(p[r][c])||0;puzzle[r][c]=v;player[r][c]=v;}}
  selectedCell=null;render();
}
function render(){
  var g=document.getElementById('sdGrid');g.innerHTML='';
  for(var r=0;r<9;r++){for(var c=0;c<9;c++){var cell=document.createElement('div');cell.className='sd-cell';if(puzzle[r][c]!==0)cell.classList.add('given');
    if(player[r][c]!==0)cell.textContent=player[r][c];
    if(selectedCell&&selectedCell.r===r&&selectedCell.c===c)cell.classList.add('selected');
    if(player[r][c]!==0&&puzzle[r][c]===0&&!isValid(r,c,player[r][c]))cell.classList.add('error');
    cell.onclick=(function(r,c){return function(){if(puzzle[r][c]!==0)return;selectedCell={r:r,c:c};render();};})(r,c);
    g.appendChild(cell);
  }}
}
function fillNum(n){
  if(!selectedCell)return;var r=selectedCell.r,c=selectedCell.c;if(puzzle[r][c]!==0)return;player[r][c]=n;render();
  if(checkComplete())showToast('🎉 恭喜完成！You solved it!');
}
function isValid(r,c,v){if(v===0)return true;for(var i=0;i<9;i++)if(i!==c&&player[r][i]===v)return false;for(var i=0;i<9;i++)if(i!==r&&player[i][c]===v)return false;var br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;for(var i=br;i<br+3;i++)for(var j=bc;j<bc+3;j++)if(i!==r||j!==c)if(player[i][j]===v)return false;return true;}
function checkComplete(){for(var r=0;r<9;r++)for(var c=0;c<9;c++){if(player[r][c]===0)return false;if(!isValid(r,c,player[r][c]))return false;}return true;}
newGame();
</script></body></html>
