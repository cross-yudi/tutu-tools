<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本增加序号 Line Numbering - 兔兔在线工具站</title>
<meta name="description" content="在线给文本每行增加序号/编号。Add line numbers or bullet points to text.">
<meta name="keywords" content="文本序号,行编号,line numbering,添加序号,编号工具">
<link rel="stylesheet" href="../../css/style.css"></head>
<body>
<header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔在线工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header>
<main class="main">
<div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 文本增加序号</div><h2>🔢 文本增加序号</h2><p class="desc">给文本每行添加序号、编号或项目符号</p><p class="desc-en">Add line numbers, bullets or custom prefixes</p></div>
<div class="tool-body">
<div class="tool-row"><div class="tool-panel"><label>输入文本 <span class="label-en">Input</span></label><textarea id="input" placeholder="每行一个条目... One item per line..." style="min-height:200px;"></textarea></div>
<div class="tool-panel" style="max-width:300px;"><label>序号样式 <span class="label-en">Style</span></label>
<select id="style" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;">
<option value="1.">1. 2. 3. ...</option><option value="1)">1) 2) 3) ...</option>
<option value="(1)">(1) (2) (3) ...</option><option value="一.">一. 二. 三. ... (中文)</option>
<option value="A.">A. B. C. ...</option><option value="a)">a) b) c) ...</option>
<option value="•">• 项目符号 Bullets</option><option value="custom">自定义 Custom</option></select>
<div id="customDiv" style="margin-top:6px;display:none;"><label style="font-size:.75rem;">自定义前缀 Custom Prefix</label><input type="text" id="customPrefix" value="# "></div>
<label style="margin-top:8px;font-size:.8rem;">起始序号 Start from</label><input type="number" id="start" value="1" min="0" style="width:80px;">
<button class="btn btn-primary" style="margin-top:10px;width:100%;" onclick="addNumbers()">添加序号 Add Numbers</button></div></div>
<div class="tool-panel"><label>结果 <span class="label-en">Result</span></label><div class="result-area" id="output"></div>
<button class="btn btn-outline btn-sm copy-btn" style="margin-top:8px;" onclick="copyText(document.getElementById('output').textContent)">📋 复制 Copy</button></div>
</div></main>
<footer class="footer">© 2026 兔兔在线工具站 Tutu Tools — 联系 Contact: gubaby@proton.me</footer>
<script src="../../js/common.js"></script>
<script>
var cnNums=['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
document.getElementById('style').addEventListener('change',function(){document.getElementById('customDiv').style.display=this.value==='custom'?'':'none';});

function addNumbers(){
  var lines=document.getElementById('input').value.split('\n');
  var style=document.getElementById('style').value;
  var start=parseInt(document.getElementById('start').value)||1;
  var prefix=document.getElementById('customPrefix').value;
  var result=lines.map(function(line,i){
    var n=i+start,label='';
    switch(style){
      case '1.':label=n+'. ';break;case '1)':label=n+') ';break;case '(1)':label='('+n+') ';break;
      case '一.':label=(cnNums[n-1]||n)+'. ';break;
      case 'A.':label=String.fromCharCode(64+((n-1)%26+1))+'. ';break;
      case 'a)':label=String.fromCharCode(96+((n-1)%26+1))+') ';break;
      case '•':label='• ';break;case 'custom':label=prefix;
    }
    return label+line;
  }).join('\n');
  document.getElementById('output').textContent=result;
}
</script>
</body>
</html>
