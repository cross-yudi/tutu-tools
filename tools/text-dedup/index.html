<body>
<header class="header">
  <div class="header-inner">
    <a href="../../index.html" class="logo">
      <span class="logo-emoji">🐰</span>
      <span class="logo-text"><span class="logo-cn">兔兔在线工具站</span><span class="logo-en">Tutu Tools</span></span>
    </a>
  </div>
</header>
<main class="main">
  <div class="tool-header">
    <div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 文本去重排序</div>
    <h2>✂️ 文本去重排序 Text Dedup</h2>
    <p class="desc">按行去重、排序、反转、打乱文本</p>
    <p class="desc-en">Remove duplicate lines, sort, reverse, or shuffle text</p>
  </div>
  <div class="tool-body">
    <div class="tool-row">
      <div class="tool-panel">
        <label>输入文本 <span class="label-en">Input</span></label>
        <textarea id="input" placeholder="每行一个条目，输入文本... One entry per line..."></textarea>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-primary" onclick="process('dedup')">去重 Dedup</button>
          <button class="btn btn-primary" onclick="process('sortAsc')">升序 Sort A→Z</button>
          <button class="btn btn-primary" onclick="process('sortDesc')">降序 Sort Z→A</button>
          <button class="btn btn-outline" onclick="process('reverse')">反转 Reverse</button>
          <button class="btn btn-outline" onclick="process('shuffle')">打乱 Shuffle</button>
          <button class="btn btn-outline" onclick="clearInput('input')">清空 Clear</button>
        </div>
      </div>
    </div>
    <div class="tool-panel">
      <label>结果 <span class="label-en">Result</span></label>
      <div class="result-area" id="output"></div>
      <div class="info-bar">
        <span id="infoTip"></span>
        <button class="btn btn-outline btn-sm copy-btn" onclick="copyText(document.getElementById('output').textContent)">📋 复制 Copy</button>
      </div>
    </div>
  </div>
</main>

<script src="../../js/common.js?v=4"></script>
<script>
function process(type) {
  var text = document.getElementById('input').value.trim();
  if (!text) return;
  var lines = text.split('\n').filter(function(l) { return l.trim(); });
  var total = lines.length;
  switch (type) {
    case 'dedup':
      lines = lines.filter(function(v, i, a) { return a.indexOf(v) === i; });
      break;
    case 'sortAsc': lines.sort(); break;
    case 'sortDesc': lines.sort().reverse(); break;
    case 'reverse': lines.reverse(); break;
    case 'shuffle':
      for (var i = lines.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = lines[i]; lines[i] = lines[j]; lines[j] = tmp;
      }
      break;
  }
  document.getElementById('output').textContent = lines.join('\n');
  document.getElementById('infoTip').textContent = '共 ' + lines.length + ' 行 lines（原始 ' + total + ' 行）';
}
</script>
</body>
