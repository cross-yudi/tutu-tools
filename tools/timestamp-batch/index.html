<script src="../../js/common.js?v=4"></script>
<script>
function convert(type){
  var lines=document.getElementById('input').value.split('\n');
  var results=[];
  lines.forEach(function(line){
    line=line.trim();if(!line)return;
    if(type==='ts2date'){
      var ts=parseInt(line);
      if(isNaN(ts)){results.push(line+' → 无效 Invalid');return;}
      if(ts>99999999999)ts=Math.floor(ts/1000);
      var d=new Date(ts*1000);
      if(isNaN(d.getTime())){results.push(line+' → 无效 Invalid');return;}
      results.push(line+' → '+d.toLocaleString('zh-CN'));
    }else{
      var d=new Date(line);
      if(isNaN(d.getTime())){results.push(line+' → 无效 Invalid');return;}
      results.push(line+' → '+Math.floor(d.getTime()/1000)+' (秒 sec) / '+d.getTime()+' (毫秒 ms)');
    }
  });
  document.getElementById('output').innerHTML=results.map(function(r){return '<div>'+r+'</div>';}).join('');
}
