<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>打字速度测试 Typing Test - 兔兔工具站</title><meta name="description" content="在线打字速度测试。Typing speed test — WPM & accuracy."><meta name="keywords" content="打字测试,typing test,WPM"><link rel="stylesheet" href="../../css/style.css"><style>#typing{width:100%;min-height:120px;padding:14px;font-size:1.1rem;font-family:monospace;border:2px solid var(--border);border-radius:8px;resize:none;outline:none;}#target{font-size:1.1rem;line-height:1.8;padding:12px;background:#f8fafc;border-radius:8px;min-height:80px;}.correct{color:#10b981;}.wrong{color:#ef4444;}.current{background:#fef3c7;}</style></head><body><header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header><main class="main"><div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 打字测试</div><h2>⌨️ 打字速度测试</h2><p class="desc">测试你的英文打字速度和准确率</p><p class="desc-en">Test your typing speed & accuracy (WPM)</p></div><div class="tool-body"><div class="tool-row"><div class="tool-panel"><label>范文 <span class="label-en">Target</span></label><div id="target"></div></div></div><div class="tool-row"><div class="tool-panel"><label>输入区 <span class="label-en">Type Here</span></label><textarea id="typing" placeholder="在这里打字... Start typing here..." autofocus></textarea></div></div><div style="text-align:center;margin-top:8px;">WPM：<strong id="wpm" style="font-size:1.5rem;">0</strong> | 准确率 Accuracy：<strong id="acc" style="font-size:1.5rem;">100%</strong> | 时间 Time：<strong id="timer">0</strong>s</div><button class="btn btn-primary" style="margin-top:8px;" onclick="newTest()">新测试 New Test</button></div></main><footer class="footer">© 2026 兔兔工具站 Tutu Tools</footer><script src="../../js/common.js"></script><script>
var texts=['The quick brown fox jumps over the lazy dog. Programming is the art of telling another human what one wants the computer to do.',
'A journey of a thousand miles begins with a single step. Practice makes perfect, so keep typing to improve your skills every day.',
'Technology is best when it brings people together. The best way to predict the future is to invent it. Code is like humor.'];
var target='',started=false,startTime=0,timerId=null;
function newTest(){target=texts[Math.floor(Math.random()*texts.length)];document.getElementById('target').textContent=target;document.getElementById('typing').value='';document.getElementById('wpm').textContent='0';document.getElementById('acc').textContent='100%';document.getElementById('timer').textContent='0';started=false;if(timerId)clearInterval(timerId);}
function updateWPM(){var input=document.getElementById('typing').value;if(!started&&input.length>0){started=true;startTime=Date.now();timerId=setInterval(function(){document.getElementById('timer').textContent=Math.floor((Date.now()-startTime)/1000);},500);}
  if(!started)return;var correct=0;for(var i=0;i<Math.min(input.length,target.length);i++)if(input[i]===target[i])correct++;
  var elapsed=(Date.now()-startTime)/60000;var wpm=elapsed>0?Math.round((correct/5)/elapsed):0;var acc=input.length>0?Math.round(correct/input.length*100):100;
  document.getElementById('wpm').textContent=wpm;document.getElementById('acc').textContent=acc+'%';}
document.getElementById('typing').addEventListener('input',updateWPM);
newTest();
</script></body></html>
