<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词频统计 Word Frequency - 兔兔在线工具站</title>
<meta name="description" content="在线词频统计工具，统计文本中每个单词/汉字出现次数。Count word/character frequency in text.">
<meta name="keywords" content="词频统计,word frequency,词汇统计,词频分析,text analysis">
<link rel="stylesheet" href="../../css/style.css"></head>
<body>
<header class="header"><div class="header-inner"><a href="../../index.html" class="logo"><span class="logo-emoji">🐰</span><span class="logo-text"><span class="logo-cn">兔兔在线工具站</span><span class="logo-en">Tutu Tools</span></span></a></div></header>
<main class="main">
<div class="tool-header"><div class="breadcrumb"><a href="../../index.html">首页 Home</a> / 词频统计</div><h2>📈 词频统计工具</h2><p class="desc">统计文本中每个单词或汉字的出现频率</p><p class="desc-en">Count word & character frequency in your text</p></div>
<div class="tool-body">
<div class="tool-row"><div class="tool-panel"><label>输入文本 <span class="label-en">Input</span></label><textarea id="input" placeholder="输入要分析的文本... Enter text to analyze..." style="min-height:200px;"></textarea>
<div style="margin-top:8px;">
<label style="font-size:.8rem;">统计模式 Mode</label>
<select id="mode" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;">
<option value="word">英文单词 English Words</option><option value="char">汉字 Chinese Characters</option>
<option value="both">混合 Mixed</option></select></div>
<button class="btn btn-primary" style="margin-top:10px;width:100%;" onclick="analyze()">分析 Analyze</button></div></div>
<div class="tool-panel"><label>统计结果 <span class="label-en">Result</span></label><div class="result-area" id="output" style="font-family:inherit;max-height:400px;overflow:auto;"></div>
<div class="info-bar"><span id="infoTip"></span></div></div>
</div></main>
<footer class="footer">© 2026 兔兔在线工具站 Tutu Tools — 联系 Contact: gubaby@proton.me</footer>
<script src="../../js/common.js"></script>
<script>
function analyze(){
  var text=document.getElementById('input').value;
  var mode=document.getElementById('mode').value;
  var freq={},total=0;

  if(mode==='word'||mode==='both'){
    var words=text.toLowerCase().match(/[a-zA-Z]+/g)||[];
    words.forEach(function(w){freq[w]=(freq[w]||0)+1;total++;});
  }
  if(mode==='char'||mode==='both'){
    var chars=text.match(/[一-鿿]/g)||[];
    chars.forEach(function(c){freq[c]=(freq[c]||0)+1;total++;});
  }

  var sorted=Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];}).slice(0,100);
  var html='<table style="width:100%;border-collapse:collapse;"><tr style="background:var(--bg);font-weight:600;"><td>#</td><td>词/字</td><td>次数 Count</td><td>占比 Ratio</td><td>柱状图 Bar</td></tr>';
  sorted.forEach(function(k,i){
    var pct=(freq[k]/total*100).toFixed(1);
    var bar='█'.repeat(Math.round(freq[k]/Math.max(1,sorted.length>0?freq[sorted[0]]:1)*30));
    html+='<tr><td style="padding:2px 6px;border-bottom:1px solid #f1f5f9;">'+(i+1)+'</td>'+
      '<td style="padding:2px 6px;border-bottom:1px solid #f1f5f9;"><strong>'+k+'</strong></td>'+
      '<td style="padding:2px 6px;border-bottom:1px solid #f1f5f9;">'+freq[k]+'</td>'+
      '<td style="padding:2px 6px;border-bottom:1px solid #f1f5f9;">'+pct+'%</td>'+
      '<td style="padding:2px 6px;border-bottom:1px solid #f1f5f9;font-size:.7rem;color:var(--primary-dark);">'+bar+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('output').innerHTML=html;
  document.getElementById('infoTip').textContent='共 '+sorted.length+' 个不同词/字 Unique | 总计 '+total+' 次 Total';
}
</script>
</body>
</html>
