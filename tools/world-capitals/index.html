<script>

function render(data){
  var html='<table style="width:100%;border-collapse:collapse;"><tr style="background:var(--bg);font-weight:600;"><td>国家</td><td>首都</td><td>人口</td><td>面积</td><td>语言</td></tr>';
  data.forEach(function(c){html+='<tr><td style="padding:4px 6px;border-bottom:1px solid #f1f5f9;">'+c.country+'</td><td style="padding:4px 6px;border-bottom:1px solid #f1f5f9;"><strong>'+c.capital+'</strong></td><td style="padding:4px 6px;border-bottom:1px solid #f1f5f9;">'+c.pop+'</td><td style="padding:4px 6px;border-bottom:1px solid #f1f5f9;">'+c.area+'</td><td style="padding:4px 6px;border-bottom:1px solid #f1f5f9;color:var(--text-secondary);">'+c.lang+'</td></tr>';});
  html+='</table>';
  document.getElementById('list').innerHTML=html;
}
function filter(){
  var kw=document.getElementById('search').value.toLowerCase();
  render(capitals.filter(function(c){return(c.country+c.capital+c.lang).toLowerCase().indexOf(kw)>=0;}));
}
render(capitals);
</script>
