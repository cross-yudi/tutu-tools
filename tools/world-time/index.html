<script>
var cities=[
  {name:'北京 Beijing',utc:8},{name:'东京 Tokyo',utc:9},{name:'首尔 Seoul',utc:9},
  {name:'新加坡 Singapore',utc:8},{name:'悉尼 Sydney',utc:10},{name:'莫斯科 Moscow',utc:3},
  {name:'迪拜 Dubai',utc:4},{name:'伦敦 London',utc:0},{name:'巴黎 Paris',utc:1},
  {name:'柏林 Berlin',utc:1},{name:'纽约 New York',utc:-5},{name:'洛杉矶 LA',utc:-8},
  {name:'芝加哥 Chicago',utc:-6},{name:'多伦多 Toronto',utc:-5},{name:'旧金山 SF',utc:-8},
  {name:'香港 Hong Kong',utc:8},{name:'台北 Taipei',utc:8},{name:'曼谷 Bangkok',utc:7},
  {name:'新德里 New Delhi',utc:5.5},{name:'开普敦 Cape Town',utc:2}
];

function update(){
  var now=new Date();
  document.getElementById('beijingTime').textContent=now.toLocaleTimeString('zh-CN');
  var html='';
  cities.forEach(function(c){
    var local=new Date(now.toLocaleString('en-US',{timeZone:'UTC'}));
    local.setHours(local.getHours()+c.utc);
    var h=local.getHours(),m=local.getMinutes();
    var diff=c.utc-8,diffStr=diff>0?'+'+diff:diff===0?'±0':String(diff);
    var bg=h>=6&&h<18?'#f0fdf4':'#f8fafc';
    html+='<div style="background:'+bg+';padding:8px 12px;border-radius:8px;border:1px solid var(--border);">'+
      '<strong>'+c.name+'</strong><br>'+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+
      ' <span style="color:'+(diff===0?'#059669':'var(--text-secondary)')+';font-size:.75rem;">UTC'+diffStr+'h</span></div>';
  });
  document.getElementById('cities').innerHTML=html;
}
setInterval(update,30000);update();
</script></body></html>
